<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS MAINFRAME // LIAISON NEURONALE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-primary: #00ff9d;
            --accent-secondary: #00b8ff;
            --accent-danger: #ff2a2a;
            --accent-restricted: #ffaa00;
            --font-code: 'JetBrains Mono', monospace;
            --font-display: 'Share Tech Mono', monospace;
            --bg-glass: rgba(6, 10, 15, 0.65);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020406;
            background: radial-gradient(circle at center, #050914 0%, #010203 100%);
            color: #fff;
            font-family: var(--font-display);
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 998;
        }
        .auth-content { display: none !important; }
        body.logged-in .auth-content { display: flex !important; }
        body.logged-in #login-overlay { display: none !important; }
        #neural-network {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            opacity: 0.6;
        }
        #login-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 10;
        }
        .login-box {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50%;
            padding: 60px;
            width: 380px;
            height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.1), inset 0 0 20px rgba(0, 255, 157, 0.05);
            animation: systemBoot 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards, floatAnim 6s ease-in-out infinite;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent, var(--accent-primary), transparent, var(--accent-secondary));
            z-index: -1;
            animation: spinBg 4s linear infinite;
            opacity: 0.5;
        }
        .login-title {
            font-family: var(--font-code);
            font-size: 1.3rem;
            color: #fff;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px var(--accent-primary);
        }
        .login-field {
            margin-bottom: 18px;
            width: 100%;
            text-align: center;
        }
        .login-field .cmd-input {
            width: 85%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            color: var(--accent-primary);
            padding: 12px;
            font-size: 1rem;
            text-align: center;
            font-family: var(--font-code);
            outline: none;
            transition: all 0.3s ease;
        }
        .login-field .cmd-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
            background: rgba(0, 255, 157, 0.05);
        }
        .btn-connect {
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 12px 25px;
            font-family: var(--font-code);
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            border-radius: 30px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .btn-connect:hover {
            background: var(--accent-primary);
            color: #000;
            box-shadow: 0 0 25px var(--accent-primary);
            transform: scale(1.05);
        }
        .neural-dashboard {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            animation: fadeIn 2s ease-out;
        }
        .orbit {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .orbit-1 { width: 50vmin; height: 50vmin; border: 1px dashed rgba(0, 255, 157, 0.15); }
        .orbit-2 { width: 75vmin; height: 75vmin; border: 1px dashed rgba(255, 170, 0, 0.15); }
        .orbit-10 { width: 95vmin; height: 95vmin; border: 1px dashed rgba(255, 42, 42, 0.15); }
        .orbit-label {
            position: absolute;
            bottom: -8px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-glass);
            padding: 0 10px;
            font-family: var(--font-code);
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            white-space: nowrap;
            border-radius: 10px;
        }
        .synapse-lines {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vmin; height: 100vmin;
            z-index: 1;
            pointer-events: none;
        }
        .synapse-lines line {
            stroke: rgba(0, 255, 157, 0.25);
            stroke-width: 1.5;
            stroke-dasharray: 6 4;
            animation: dataFlow 30s linear infinite reverse;
        }
        .synapse-lines line.restricted { stroke: rgba(255, 170, 0, 0.3); }
        .synapse-lines line.admin { stroke: rgba(255, 42, 42, 0.3); }
        .node {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 157, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            text-decoration: none;
            color: #fff;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .node::after {
            content: ''; position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }
        .node:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 35px rgba(0, 255, 157, 0.4), inset 0 0 20px rgba(0, 255, 157, 0.2);
            z-index: 20;
            background: rgba(0, 255, 157, 0.15);
        }
        .node .icon {
            font-size: clamp(1.2rem, 3vmin, 1.8rem);
            margin-bottom: 5px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.6));
            transition: transform 0.3s;
        }
        .node:hover .icon { transform: scale(1.1); }
        .node .label {
            font-family: var(--font-code);
            font-size: clamp(0.55rem, 1.2vmin, 0.7rem);
            text-align: center;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .node:hover .label { opacity: 1; text-shadow: 0 0 10px var(--accent-primary); }
        .node-core {
            width: clamp(120px, 20vmin, 180px); 
            height: clamp(120px, 20vmin, 180px);
            transform: translate(-50%, -50%);
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.2), inset 0 0 30px rgba(0, 255, 157, 0.1);
            background: rgba(6, 10, 15, 0.85);
        }
        .node-core::before {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            border-radius: 50%; border: 2px dashed rgba(0, 184, 255, 0.5);
            animation: spinBg 15s linear infinite; pointer-events: none;
        }
        .node-core::after {
            content: ''; position: absolute; top: -25px; left: -25px; right: -25px; bottom: -25px;
            border-radius: 50%; border: 1px dotted rgba(0, 255, 157, 0.3);
            animation: spinBg 25s linear infinite reverse; pointer-events: none;
        }
        .node-core:hover { transform: translate(-50%, -50%) scale(1.05); }
        .node-core .icon { font-size: clamp(2rem, 5vmin, 3.5rem); }
        .node-core .label { font-weight: bold; opacity: 1;}
        .node-sub { 
            width: clamp(75px, 14vmin, 110px); 
            height: clamp(75px, 14vmin, 110px); 
            animation: floatAnim 4s ease-in-out infinite;
        }
        .node-sub:hover { animation-play-state: paused; }

        .pos-lvl1-4 { transform: translate(-50%, -50%) rotate(210deg) translateY(-25vmin) rotate(-210deg); animation-delay: 0.7s;}

        .pos-lvl2-2 { transform: translate(-50%, -50%) rotate(180deg) translateY(-37.5vmin) rotate(-180deg); animation-delay: 0.8s;}
        .pos-lvl10-1 { transform: translate(-50%, -50%) rotate(45deg) translateY(-47.5vmin) rotate(-45deg); animation-delay: 0.4s;}
        .pos-lvl10-2 { transform: translate(-50%, -50%) rotate(315deg) translateY(-47.5vmin) rotate(-315deg); animation-delay: 1.0s;}
        .pos-lvl1-1:hover { transform: translate(-50%, -50%) rotate(30deg) translateY(-25vmin) rotate(-30deg) scale(1.15) !important; }
        .pos-lvl1-2:hover { transform: translate(-50%, -50%) rotate(90deg) translateY(-25vmin) rotate(-90deg) scale(1.15) !important; }
        .pos-lvl1-3:hover { transform: translate(-50%, -50%) rotate(150deg) translateY(-25vmin) rotate(-150deg) scale(1.15) !important; }
        .pos-lvl1-4:hover { transform: translate(-50%, -50%) rotate(210deg) translateY(-25vmin) rotate(-210deg) scale(1.15) !important; }
        .pos-lvl1-5:hover { transform: translate(-50%, -50%) rotate(270deg) translateY(-25vmin) rotate(-270deg) scale(1.15) !important; }
        .pos-lvl1-6:hover { transform: translate(-50%, -50%) rotate(330deg) translateY(-25vmin) rotate(-330deg) scale(1.15) !important; }
        .pos-lvl2-1:hover { transform: translate(-50%, -50%) rotate(0deg) translateY(-37.5vmin) rotate(0deg) scale(1.15) !important; }
        .pos-lvl2-2:hover { transform: translate(-50%, -50%) rotate(180deg) translateY(-37.5vmin) rotate(-180deg) scale(1.15) !important; }
        .pos-lvl10-1:hover { transform: translate(-50%, -50%) rotate(45deg) translateY(-47.5vmin) rotate(-45deg) scale(1.15) !important; }
        .pos-lvl10-2:hover { transform: translate(-50%, -50%) rotate(315deg) translateY(-47.5vmin) rotate(-315deg) scale(1.15) !important; }
        .node.status-restricted { border-color: var(--accent-restricted); }
        .node.status-restricted:hover { box-shadow: 0 0 35px rgba(255, 170, 0, 0.5), inset 0 0 20px rgba(255, 170, 0, 0.2); background: rgba(255, 170, 0, 0.15); }
        .node.status-restricted .icon { filter: drop-shadow(0 0 8px rgba(255, 170, 0, 0.6)); }
        .node.status-admin { border-color: var(--accent-danger); }
        .node.status-admin:hover { box-shadow: 0 0 40px rgba(255, 42, 42, 0.6), inset 0 0 25px rgba(255, 42, 42, 0.3); background: rgba(255, 42, 42, 0.2); }
        .node.status-admin .icon { filter: drop-shadow(0 0 10px rgba(255, 42, 42, 0.8)); }
        .hud-overlay {
            position: fixed; top: 30px; left: 30px;
            pointer-events: none; z-index: 100;
            border-left: 3px solid var(--accent-primary);
            padding-left: 15px;
            background: linear-gradient(90deg, rgba(0,255,157,0.1) 0%, transparent 100%);
            padding: 10px 20px;
        }
        .hud-top-right {
            position: fixed; top: 30px; right: 30px;
            text-align: right; pointer-events: auto; z-index: 100;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }
        @keyframes floatAnim { 
            0%, 100% { margin-top: 0; } 
            50% { margin-top: -8px; } 
        }
        @keyframes dataFlow { to { stroke-dashoffset: 1000; } }
        @keyframes systemBoot {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        @media (max-width: 768px) {
            .hud-top-right {
                top: 15px;
                right: 15px;
            }
            .node-core { width: 130px; height: 130px; }
            .node-sub { width: 85px; height: 85px; }
            .node .icon { font-size: 1.4rem; }
            .node .label { font-size: 0.6rem; }
        }
    </style>
</head>

<script>
const canvas = document.getElementById('neural-network');
const ctx = canvas.getContext('2d');
let width, height;
let particles = [];
const connectionDistance = 180;
const neuronColor = '0, 255, 157';
const mouseColor = '0, 184, 255';
let mouse = { x: null, y: null, radius: 200 };
window.addEventListener('mousemove', (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
});
window.addEventListener('mouseout', () => {
    mouse.x = null;
    mouse.y = null;
});
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
class Neuron {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2 + 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
        if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
                const forceDirectionX = dx / distance;
                const forceDirectionY = dy / distance;
                const force = (mouse.radius - distance) / mouse.radius;
                this.x -= forceDirectionX * force * 2;
                this.y -= forceDirectionY * force * 2;
            }
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${neuronColor}, 0.8)`;
        ctx.fill();
    }
}
function initNeurons() {
    particles = [];
    const neuronCount = (width * height) / 10000;
    for (let i = 0; i < neuronCount; i++) {
        particles.push(new Neuron());
    }
}
function animateNeurons() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(neuron => {
        neuron.update();
        neuron.draw();
    });
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < connectionDistance) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                const opacity = 1 - (distance / connectionDistance);
                ctx.strokeStyle = `rgba(${neuronColor}, ${opacity * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        if (mouse.x != null) {
            const dxm = particles[i].x - mouse.x;
            const dym = particles[i].y - mouse.y;
            const distanceMouse = Math.sqrt(dxm * dxm + dym * dym);
            if (distanceMouse < mouse.radius) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(mouse.x, mouse.y);
                const opacityM = 1 - (distanceMouse / mouse.radius);
                ctx.strokeStyle = `rgba(${mouseColor}, ${opacityM * 0.6})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateNeurons);
}
window.addEventListener('resize', () => {
    resize();
    initNeurons();
});
resize();
initNeurons();
animateNeurons();
function simulateLogin() {
    const userInput = document.getElementById('login-username').value;
    if(userInput.trim() === '') {
        document.getElementById('login-msg').innerText = "ERREUR: EMPREINTE MANQUANTE";
        return;
    }
    document.body.classList.add('logged-in');
}
function simulateLogout() {
    document.body.classList.remove('logged-in');
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-msg').innerText = '';
}
function accessModule(url, level) {
    console.log("Accès au module : " + url + " (Niveau " + level + ")");
    window.location.href = url;
}
