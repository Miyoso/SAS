<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS MAINFRAME // LIAISON NEURONALE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/stylele.css">
    
    <style>
        :root {
            --accent-primary: #00ff9d;
            --accent-danger: #ff3333;
            --accent-restricted: #ffaa00;
            --font-code: 'JetBrains Mono', monospace;
            --bg-dark: rgba(10, 14, 18, 0.95);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050709;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
        }

        .auth-content { display: none !important; }
        body.logged-in .auth-content { display: flex !important; }
        body.logged-in #login-overlay { display: none !important; }
        
        #neural-network {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        #login-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .login-box {
            background: var(--bg-dark);
            border: 1px solid var(--accent-primary);
            border-radius: 50%;
            padding: 60px;
            width: 350px;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: systemBoot 1.5s ease-out forwards, neuralPulse 4s infinite alternate;
        }

        @keyframes neuralPulse {
            0% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.1), inset 0 0 10px rgba(0, 255, 157, 0.05); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 157, 0.4), inset 0 0 30px rgba(0, 255, 157, 0.2); }
            100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.1), inset 0 0 10px rgba(0, 255, 157, 0.05); }
        }

        .login-title {
            font-family: var(--font-code);
            font-size: 1.2rem;
            color: #fff;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--accent-primary);
        }

        .login-field {
            margin-bottom: 15px;
            width: 100%;
            text-align: center;
        }

        .login-field .cmd-input {
            width: 80%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 8px;
            font-size: 1rem;
            text-align: center;
            font-family: var(--font-code);
            outline: none;
        }

        .login-field .cmd-input::placeholder {
            color: rgba(0, 255, 157, 0.3);
        }

        .btn-connect {
            background: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 10px 20px;
            font-family: var(--font-code);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            border-radius: 20px;
        }

        .btn-connect:hover {
            background: var(--accent-primary);
            color: #000;
            box-shadow: 0 0 15px var(--accent-primary);
        }

        @keyframes systemBoot {
            0% { opacity: 0; transform: scale(0.5); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .neural-dashboard {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 2s ease-out;
        }

        .synapse-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .synapse-lines line {
            stroke: rgba(0, 255, 157, 0.3);
            stroke-width: 2;
            stroke-dasharray: 10;
            animation: flow 20s linear infinite;
        }

        .synapse-lines line.restricted {
            stroke: rgba(255, 170, 0, 0.3);
        }

        .synapse-lines line.danger {
            stroke: rgba(255, 51, 51, 0.3);
        }

        @keyframes flow {
            to { stroke-dashoffset: -1000; }
        }

        .node {
            position: absolute;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid var(--accent-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            text-decoration: none;
            color: #fff;
            padding: 10px;
        }

        .node:hover {
            transform: scale(1.2);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.6), inset 0 0 15px rgba(0, 255, 157, 0.4);
            z-index: 20;
            background: rgba(0, 255, 157, 0.1);
        }

        .node .icon {
            font-size: 2rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 5px var(--accent-primary));
        }

        .node .label {
            font-family: var(--font-code);
            font-size: 0.75rem;
            text-align: center;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .node:hover .label {
            opacity: 1;
            text-shadow: 0 0 8px var(--accent-primary);
        }

        .node-core {
            width: 160px;
            height: 160px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-width: 3px;
            animation: neuralPulse 3s infinite alternate;
        }
        .node-core:hover { transform: translate(-50%, -50%) scale(1.1); }
        .node-core .icon { font-size: 3rem; }
        .node-core .label { font-size: 1rem; font-weight: bold; }

        .node-sub { width: 100px; height: 100px; }
        .node-sub:hover { transform: translate(-50%, -50%) scale(1.2); }
        
        .pos-1 { top: 15%; left: 50%; transform: translate(-50%, -50%); }
        .pos-2 { top: 85%; left: 50%; transform: translate(-50%, -50%); }
        .pos-3 { top: 50%; left: 15%; transform: translate(-50%, -50%); }
        .pos-4 { top: 50%; left: 85%; transform: translate(-50%, -50%); }
        .pos-5 { top: 25%; left: 25%; transform: translate(-50%, -50%); }
        .pos-6 { top: 25%; left: 75%; transform: translate(-50%, -50%); }
        .pos-7 { top: 75%; left: 25%; transform: translate(-50%, -50%); }
        .pos-8 { top: 75%; left: 75%; transform: translate(-50%, -50%); }

        .node.status-restricted { border-color: var(--accent-restricted); }
        .node.status-restricted:hover { box-shadow: 0 0 30px rgba(255, 170, 0, 0.6), inset 0 0 15px rgba(255, 170, 0, 0.4); background: rgba(255, 170, 0, 0.1); }
        .node.status-restricted .icon { filter: drop-shadow(0 0 5px var(--accent-restricted)); }

        .node.status-danger { border-color: var(--accent-danger); }
        .node.status-danger:hover { box-shadow: 0 0 30px rgba(255, 51, 51, 0.6), inset 0 0 15px rgba(255, 51, 51, 0.4); background: rgba(255, 51, 51, 0.1); }
        .node.status-danger .icon { filter: drop-shadow(0 0 5px var(--accent-danger)); }

        .hud-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .hud-top-right {
            position: fixed;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: auto;
            z-index: 100;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .node-core { width: 120px; height: 120px; }
            .node-sub { width: 80px; height: 80px; }
            .node .icon { font-size: 1.5rem; }
            .node .label { font-size: 0.6rem; }
            .pos-1 { top: 10%; } .pos-2 { top: 90%; }
            .pos-3 { left: 10%; } .pos-4 { left: 90%; }
            .pos-5 { top: 20%; left: 20%; } .pos-6 { top: 20%; left: 80%; }
            .pos-7 { top: 80%; left: 20%; } .pos-8 { top: 80%; left: 80%; }
        }
    </style>
</head>
<body>

<canvas id="neural-network" aria-hidden="true"></canvas>

<section id="login-overlay">
    <div class="login-box" id="login-box">
        <div class="login-title">>_ LIAISON SYNAPTIQUE</div>
        
        <div class="login-field">
            <input type="text" id="login-username" class="cmd-input" placeholder="EMPREINTE_CORTICALE" autocomplete="off" autofocus>
        </div>
        
        <div class="login-field">
            <input type="password" id="login-password" class="cmd-input" placeholder="SOUCHE_MÉMORIELLE">
        </div>
        
        <div id="login-msg" class="term-line term-error" style="min-height: 20px; font-family: var(--font-code); font-size: 0.8rem; margin-bottom: 10px;"></div>
        
        <button class="btn-connect" onclick="simulateLogin()">[ SYNCHRONISER ]</button>
    </div>
</section>

<div class="hud-overlay auth-content">
    <div>SAS // <span>MAINFRAME</span></div>
    <div style="font-size:0.7rem; color: var(--accent-primary);">ÉTAT: SYNCHRONISÉ</div>
    <div style="font-size:0.6rem; opacity:0.7;">ONDES ALPHA STABLES</div>
</div>

<div class="hud-top-right auth-content">
    <button class="btn-connect" style="font-size: 0.7rem; padding: 5px 10px;" onclick="simulateLogout()">DÉCONNEXION</button>
</div>

<div class="neural-dashboard auth-content">
    <svg class="synapse-lines">
        <line x1="50%" y1="50%" x2="50%" y2="15%" />
        <line x1="50%" y1="50%" x2="50%" y2="85%" />
        <line x1="50%" y1="50%" x2="15%" y2="50%" />
        <line x1="50%" y1="50%" x2="85%" y2="50%" />
        <line x1="50%" y1="50%" x2="25%" y2="25%" />
        <line x1="50%" y1="50%" x2="75%" y2="25%" />
        <line x1="50%" y1="50%" x2="25%" y2="75%" class="restricted" />
        <line x1="50%" y1="50%" x2="75%" y2="75%" class="danger" />
    </svg>

    <button class="node node-core" onclick="accessModule('profile.html', 1)">
        <span class="icon">🧠</span>
        <span class="label">NOYAU CENTRAL</span>
    </button>

    <button class="node node-sub pos-1" onclick="accessModule('database.html', 1)">
        <span class="icon">👥</span>
        <span class="label">BASE AGENTS</span>
    </button>

    <button class="node node-sub pos-2" onclick="accessModule('missions.html', 1)">
        <span class="icon">🗓️</span>
        <span class="label">MISSIONS</span>
    </button>

    <button class="node node-sub pos-3" onclick="accessModule('map.html', 1)">
        <span class="icon">🗺️</span>
        <span class="label">CARTE LIVE</span>
    </button>

    <button class="node node-sub pos-4" onclick="accessModule('report.html', 1)">
        <span class="icon">📝</span>
        <span class="label">RAPPORTS</span>
    </button>

    <button class="node node-sub pos-5" onclick="accessModule('reglement.html', 1)">
        <span class="icon">📜</span>
        <span class="label">ARCHIVES</span>
    </button>

    <button class="node node-sub pos-6" onclick="accessModule('logistics.html', 1)">
        <span class="icon">📦</span>
        <span class="label">MATÉRIEL</span>
    </button>

    <button class="node node-sub pos-7 status-restricted" onclick="accessModule('investigation.html', 2)">
        <span class="icon">🔍</span>
        <span class="label">ENQUÊTES</span>
    </button>

    <button class="node node-sub pos-8 status-danger" onclick="accessModule('#', 2)">
        <span class="icon">🎯</span>
        <span class="label">CIBLES VIP</span>
    </button>
</div>

<script>
const canvas = document.getElementById('neural-network');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
const connectionDistance = 180;
const neuronColor = '0, 255, 157';

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}

class Neuron {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 2 + 1;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${neuronColor}, 0.8)`;
        ctx.fill();
    }
}

function initNeurons() {
    particles = [];
    const neuronCount = (width * height) / 12000;
    for (let i = 0; i < neuronCount; i++) {
        particles.push(new Neuron());
    }
}

function animateNeurons() {
    ctx.clearRect(0, 0, width, height);

    particles.forEach(neuron => {
        neuron.update();
        neuron.draw();
    });

    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < connectionDistance) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                const opacity = 1 - (distance / connectionDistance);
                ctx.strokeStyle = `rgba(${neuronColor}, ${opacity * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateNeurons);
}

window.addEventListener('resize', () => {
    resize();
    initNeurons();
});

resize();
initNeurons();
animateNeurons();

function simulateLogin() {
    const userInput = document.getElementById('login-username').value;
    if(userInput.trim() === '') {
        document.getElementById('login-msg').innerText = "ERREUR: EMPREINTE MANQUANTE";
        return;
    }
    document.body.classList.add('logged-in');
}

function simulateLogout() {
    document.body.classList.remove('logged-in');
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-msg').innerText = '';
}

function accessModule(url, level) {
    console.log("Accès au module : " + url + " (Niveau " + level + ")");
    window.location.href = url;
}
</script>

</body>
</html>
