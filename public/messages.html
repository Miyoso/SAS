<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS MAINFRAME // COMMS CENTER</title>
    <script>if (!localStorage.getItem('sas_session')) window.location.href = 'index.html';</script>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/stylele.css">
    <style>
        .comms-wrapper { display: flex; height: calc(100vh - 190px); gap: 20px; }
        .chat-panel {
            flex: 1; display: flex; flex-direction: column;
            background: rgba(5,8,12,0.7); border: 1px solid rgba(0,255,157,0.2);
            border-top: 2px solid var(--accent-primary); overflow: hidden;
        }
        .chat-header {
            padding: 12px 20px; border-bottom: 1px dashed rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); display: flex; justify-content: space-between;
            align-items: center; font-family: var(--font-display); font-size: 0.8rem;
        }
        .live-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-primary); box-shadow: 0 0 6px var(--accent-primary);
            animation: ldot 2s infinite; margin-right: 8px;
        }
        @keyframes ldot { 0%,100%{opacity:1} 50%{opacity:.4} }
        .messages-list {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            scrollbar-width: thin; scrollbar-color: rgba(0,255,157,0.3) transparent;
        }
        .messages-list::-webkit-scrollbar { width: 4px; }
        .messages-list::-webkit-scrollbar-thumb { background: rgba(0,255,157,0.3); }
        .msg-item { display: flex; flex-direction: column; gap: 4px; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .msg-item.own { align-items: flex-end; }
        .msg-meta { display: flex; gap: 10px; align-items: baseline; font-family: var(--font-code); font-size: 0.65rem; color: #556677; }
        .msg-item.own .msg-meta { flex-direction: row-reverse; }
        .msg-author { color: var(--accent-primary); font-weight: bold; letter-spacing: 1px; }
        .msg-item.own .msg-author { color: var(--accent-blue); }
        .msg-bubble {
            background: rgba(0,20,40,0.6); border: 1px solid rgba(0,255,157,0.15);
            border-left: 2px solid var(--accent-primary); padding: 10px 14px;
            font-family: var(--font-code); font-size: 0.82rem; color: #ddd;
            max-width: 75%; line-height: 1.4; word-break: break-word;
        }
        .msg-item.own .msg-bubble {
            border-left: none; border-right: 2px solid var(--accent-blue);
            background: rgba(0,30,60,0.6); border-color: rgba(0,243,255,0.2);
            border-right-color: var(--accent-blue);
        }
        .sys-msg {
            text-align: center; font-family: var(--font-display); font-size: 0.65rem;
            color: #445566; letter-spacing: 2px; padding: 5px 0;
        }
        .chat-input-area {
            padding: 15px 20px; border-top: 1px dashed rgba(255,255,255,0.1);
            display: flex; gap: 12px; background: rgba(0,0,0,0.5);
        }
        .chat-input {
            flex: 1; background: rgba(0,255,157,0.04); border: 1px solid rgba(0,255,157,0.25);
            color: #fff; padding: 12px 16px; font-family: var(--font-code); font-size: 0.85rem;
            outline: none; transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--accent-primary); background: rgba(0,255,157,0.08); }
        .btn-send {
            background: rgba(0,255,157,0.1); border: 1px solid var(--accent-primary);
            color: var(--accent-primary); padding: 12px 20px; font-family: var(--font-display);
            letter-spacing: 1px; cursor: pointer; transition: 0.2s; font-size: 0.8rem;
        }
        .btn-send:hover { background: var(--accent-primary); color: #000; }
        .char-count { font-family: var(--font-code); font-size: 0.65rem; color: #445566; text-align: right; padding: 4px 20px; }
        .sidebar-comms { width: 240px; display: flex; flex-direction: column; gap: 0; background: rgba(5,8,12,0.7); border: 1px solid rgba(255,255,255,0.08); }
        .agents-list { padding: 10px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1; }
        .agent-entry {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px;
            font-family: var(--font-code); font-size: 0.75rem; color: #aaa;
            border-left: 2px solid transparent; transition: 0.2s;
        }
        .agent-entry:hover { border-left-color: var(--accent-primary); color: #fff; background: rgba(0,255,157,0.03); }
        .agent-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-primary); box-shadow: 0 0 5px var(--accent-primary); flex-shrink: 0; }
        .loading-msgs { text-align: center; padding: 40px; color: #445566; font-family: var(--font-display); letter-spacing: 2px; font-size: 0.75rem; }
    </style>
</head>
<body class="logged-in">

<div class="tactical-grid" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="radar-scan" aria-hidden="true"></div>

<div class="hud-side hud-left" aria-hidden="true">
    <div class="hud-ruler"></div>
    <div class="hud-marker">SYS.COMMS</div>
    <div class="hud-marker" style="color:var(--accent-primary)">ENCRYPTED</div>
    <div class="hud-ruler"></div>
</div>
<div class="hud-side hud-right" aria-hidden="true">
    <div class="hud-ruler"></div>
    <div class="hud-marker">P2P.LINK</div>
    <div class="hud-marker">128.0.0.1</div>
    <div class="hud-ruler"></div>
</div>

<div class="terminal-wrapper">
    <div class="terminal">
        <header class="header-strip" style="margin-bottom:10px;">
            <div>
                <h1>COMMS // <span style="color:var(--accent-primary)">CENTER</span></h1>
                <div class="sub-header">CANAL SÉCURISÉ // SAS-OPS // CHIFFREMENT ACTIF</div>
            </div>
            <div class="meta-data">
                <span style="color:var(--accent-primary)" class="blink">● LIVE</span>
            </div>
        </header>

        <nav class="tactical-navbar" style="display:flex;">
            <a href="index.html" class="nav-item">MAINFRAME</a>
            <a href="database.html" class="nav-item">BASE AGENTS</a>
            <a href="map.html" class="nav-item">MAP_FEED</a>
            <a href="report.html" class="nav-item">RAPPORTS</a>
            <a href="logistics.html" class="nav-item">LOGISTIQUE</a>
            <a href="missions.html" class="nav-item">MISSIONS</a>
            <a href="messages.html" class="nav-item active">COMMS</a>
        </nav>

        <main class="comms-wrapper view-section">

            <div class="chat-panel">
                <div class="chat-header">
                    <div><span class="live-dot"></span><span style="color:var(--accent-primary)">CANAL GLOBAL // SAS-OPS</span></div>
                    <span id="msg-count" style="color:#445566;">— messages</span>
                </div>

                <div class="messages-list" id="messages-list">
                    <div class="loading-msgs blink">ÉTABLISSEMENT DU LIEN SÉCURISÉ...</div>
                </div>

                <div class="char-count"><span id="char-count">0</span>/500</div>

                <div class="chat-input-area">
                    <input type="text" id="msg-input" class="chat-input"
                           placeholder="[ SAISIR MESSAGE CRYPTÉ... ]" maxlength="500" autocomplete="off">
                    <button class="btn-send" onclick="sendMessage()">[ ÉMETTRE ]</button>
                </div>
            </div>

            <aside class="sidebar-comms">
                <div class="panel-header" style="padding:12px 15px; border-bottom:1px dashed rgba(255,255,255,0.08);">
                    <span class="panel-title" style="font-size:0.75rem;">AGENTS EN LIGNE</span>
                    <span id="online-count" class="blink" style="color:var(--accent-primary);font-size:0.7rem;">—</span>
                </div>
                <div id="agents-list" class="agents-list">
                    <div style="padding:15px;color:#445566;font-size:0.7rem;font-family:var(--font-display);">SCAN EN COURS...</div>
                </div>
            </aside>

        </main>
    </div>
</div>

<script>
    const session = JSON.parse(localStorage.getItem('sas_session') || '{}');
    const token = localStorage.getItem('sas_token');
    const myUsername = session.username || 'AGENT';
    let pusher = null;
    let onlineMembers = {};

    document.addEventListener('DOMContentLoaded', () => {
        loadMessages();
        initPusher();
        const input = document.getElementById('msg-input');
        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        input.addEventListener('input', () => { document.getElementById('char-count').textContent = input.value.length; });
    });

    async function loadMessages() {
        try {
            const res = await fetch('/api/messages', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error();
            const messages = await res.json();
            const container = document.getElementById('messages-list');
            container.innerHTML = '<div class="sys-msg">-- DÉBUT DES TRANSMISSIONS --</div>';
            messages.forEach(m => appendMessage(m));
            document.getElementById('msg-count').textContent = `${messages.length} messages`;
            scrollToBottom();
        } catch (e) {
            document.getElementById('messages-list').innerHTML = '<div class="loading-msgs" style="color:var(--accent-danger)">ERREUR DE CONNEXION</div>';
        }
    }

    function appendMessage(msg) {
        const container = document.getElementById('messages-list');
        const isOwn = msg.sender_name?.toLowerCase() === myUsername?.toLowerCase();
        const time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        const item = document.createElement('div');
        item.className = `msg-item ${isOwn ? 'own' : ''}`;
        item.innerHTML = `
            <div class="msg-meta">
                <span class="msg-author">${msg.sender_name.toUpperCase()}</span>
                <span>${time}</span>
            </div>
            <div class="msg-bubble">${escapeHtml(msg.content)}</div>
        `;
        container.appendChild(item);
    }

    function escapeHtml(t) {
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function scrollToBottom() {
        const c = document.getElementById('messages-list');
        c.scrollTop = c.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const content = input.value.trim();
        if (!content) return;
        input.value = '';
        document.getElementById('char-count').textContent = '0';
        try {
            await fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ content })
            });
        } catch (e) { input.value = content; }
    }

    function initPusher() {
        pusher = new Pusher('51d51cc5bfc1c8ee90d4', {
            cluster: 'eu',
            authEndpoint: '/api/comms?type=pusher-auth',
            auth: { params: { username: myUsername, color: '#00ff9d' } }
        });

        pusher.subscribe('sas-comms').bind('new-message', msg => {
            appendMessage(msg);
            scrollToBottom();
            const c = document.getElementById('msg-count');
            const n = parseInt(c.textContent) || 0;
            c.textContent = `${n + 1} messages`;
        });

        const presence = pusher.subscribe('presence-sas-ops');
        presence.bind('pusher:subscription_succeeded', members => {
            onlineMembers = {};
            members.each(m => { onlineMembers[m.id] = m.info; });
            renderOnline();
        });
        presence.bind('pusher:member_added', m => {
            onlineMembers[m.id] = m.info;
            renderOnline();
            addSysMsg(`-- ${(m.info.name || '').toUpperCase()} A REJOINT LE CANAL --`);
        });
        presence.bind('pusher:member_removed', m => {
            delete onlineMembers[m.id];
            renderOnline();
            addSysMsg(`-- ${(m.info.name || '').toUpperCase()} A QUITTÉ LE CANAL --`);
        });
    }

    function addSysMsg(text) {
        const c = document.getElementById('messages-list');
        const d = document.createElement('div');
        d.className = 'sys-msg';
        d.textContent = text;
        c.appendChild(d);
        scrollToBottom();
    }

    function renderOnline() {
        const list = document.getElementById('agents-list');
        const members = Object.values(onlineMembers);
        document.getElementById('online-count').textContent = `${members.length} EN LIGNE`;
        if (!members.length) {
            list.innerHTML = '<div style="padding:15px;color:#445566;font-size:0.7rem;font-family:var(--font-display)">AUCUN AGENT CONNECTÉ</div>';
            return;
        }
        list.innerHTML = members.map(m => `
            <div class="agent-entry">
                <div class="agent-dot"></div>
                <span>${(m.name || 'AGENT').toUpperCase()}</span>
            </div>`).join('');
    }
</script>
</body>
</html>
