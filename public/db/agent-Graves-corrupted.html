<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATAL ERROR :: 0xDEADDEAD</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Rubik+Glitch&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        
        :root {
            --red-main: #ff003c;
            --red-dark: #4a0000;
            --bg-color: #030000;
            --font-code: 'JetBrains Mono', monospace;
            --font-glitch: 'Rubik Glitch', system-ui;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--red-main);
            overflow: hidden;
            font-family: var(--font-code);
            height: 100vh;
            width: 100vw;
        }

    
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.4;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.5));
            background-size: 100% 4px;
            z-index: 999; pointer-events: none;
        }
        
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.9);
            z-index: 998; pointer-events: none;
        }
        
        .screen-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.1);
            z-index: 997; pointer-events: none;
            /* Transition très lente, aucun risque */
            animation: flash-bg 5s infinite alternate;
        }
        
        @keyframes flash-bg {
            0%, 80% { opacity: 0; }
            100% { opacity: 0.8; background: rgba(255, 0, 0, 0.3); }
        }

        .lockout-container {
            position: relative; z-index: 10;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .warning-tape {
            width: 100%; height: 30px;
            background: repeating-linear-gradient(
                45deg,
                var(--red-dark), var(--red-dark) 20px,
                #000 20px, #000 40px
            );
            background-size: 56px 56px;
            animation: moveTape 2s linear infinite;
            border-top: 2px solid var(--red-main);
            border-bottom: 2px solid var(--red-main);
        }
        @keyframes moveTape { 0% { background-position: 0 0; } 100% { background-position: -56px 0; } }

        .fatal-panel {
            background: rgba(10, 0, 0, 0.85);
            border-left: 2px solid var(--red-main);
            border-right: 2px solid var(--red-main);
            width: 100%; max-width: 1000px;
            padding: 40px; display: flex; gap: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2), inset 0 0 30px rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(5px);
        }

        .glitch-title {
            font-family: var(--font-glitch);
            font-size: 5rem;
            color: #fff;
            text-shadow: 2px 2px 0 var(--red-main), -2px -2px 0 #00f3ff;
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }
        .glitch-title::before, .glitch-title::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,0,0,0.9);
        }
        .glitch-title::before {
            left: 3px; text-shadow: -2px 0 #00f3ff;
            animation: glitch-slice 3s infinite linear alternate-reverse;
        }
        .glitch-title::after {
            left: -3px; text-shadow: -2px 0 var(--red-main);
            animation: glitch-slice 4s infinite linear alternate-reverse;
        }

        @keyframes glitch-slice {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 1px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(2px, -1px); }
        }

        /* Ralenti à 1s pour éviter l'agression visuelle */
        .sub-title { font-size: 1.5rem; letter-spacing: 5px; color: var(--red-main); margin-bottom: 30px; animation: blinker 1s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        /* === NOUVELLE CARTE CORROMPUE (SANS SHAKE) === */
        .corrupt-card {
            flex: 0 0 250px;
            border: 2px dashed var(--red-main);
            padding: 15px;
            background: rgba(255,0,0,0.05);
            position: relative;
        }
        
        .photo-glitch-container {
            width: 100%; height: 280px;
            overflow: hidden; 
            border: 1px solid var(--red-main);
            position: relative;
            background: #000;
        }
        
        .photo-glitch-container img {
            width: 100%; height: 100%; object-fit: cover;
            /* Filtre statique lourd pour un look corrompu mais sans clignotement */
            filter: grayscale(1) sepia(1) hue-rotate(-50deg) saturate(4) contrast(1.5);
            opacity: 0.8;
            display: block;
        }

        /* Ligne de scan douce qui descend très lentement */
        .photo-glitch-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: rgba(255, 0, 60, 0.8);
            box-shadow: 0 0 20px 5px rgba(255, 0, 60, 0.5);
            animation: slow-scan 4s linear infinite;
            z-index: 2;
        }

        /* Trame d'écran fixe par-dessus la photo */
        .img-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 3;
        }

        /* Faux logs d'erreur fixes sur l'image */
        .img-error-text {
            position: absolute; top: 10px; left: 10px;
            color: rgba(255, 0, 60, 0.8);
            font-family: var(--font-code);
            font-size: 0.75rem;
            line-height: 1.3;
            z-index: 4;
        }

        @keyframes slow-scan {
            0% { transform: translateY(-20px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(300px); opacity: 0; }
        }

        .card-data { margin-top: 15px; font-size: 0.9rem; line-height: 1.6; }
        .data-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,0,0,0.3); padding-bottom: 5px; margin-bottom: 5px; }

        /* === TERMINAL LIVE === */
        .live-terminal {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--red-main);
            padding: 20px;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .live-terminal::before {
            content: 'SYSTEM LOGS'; position: absolute; top: -10px; right: 10px;
            background: var(--bg-color); padding: 0 10px; font-size: 0.8rem;
        }
        
        #console-output {
            flex: 1; overflow-y: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            font-size: 0.85rem; line-height: 1.4; color: #ff6666;
            text-shadow: 0 0 3px var(--red-main);
        }
        
        .sys-err { color: #fff; background: var(--red-dark); padding: 0 5px; display: inline-block; margin-right: 5px;}
        .hex-code { color: #aaa; }

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="screen-flash"></div>

    <div class="lockout-container">
        
        <div class="warning-tape"></div>
        
        <div class="fatal-panel">
            
            <div class="corrupt-card">
                <div class="photo-glitch-container">
                    <img src="/assets/Graves.jpg" alt="Target" onerror="this.style.display='none'">
                    <div class="img-overlay"></div>
                    <div class="img-error-text">
                        SYS_ERR_0x99<br>
                        DATA_CORRUPTED<br>
                        ...<br>
                        OFFLINE
                    </div>
                </div>
                <div class="card-data">
                    <div class="data-row"><span>ID</span> <span>[CORRUPTED]</span></div>
                    <div class="data-row"><span>NAME</span> <span>UNKNOWN</span></div>
                    <div class="data-row"><span>STATUS</span> <span class="blink">DECEASED ?</span></div>
                </div>
            </div>

            <div style="flex: 1; display: flex; flex-direction: column;">
                <div>
                    <h1 class="glitch-title" data-text="FATAL ERROR">FATAL ERROR</h1>
                    <div class="sub-title">UNAUTHORIZED ACCESS DETECTED</div>
                </div>
                
                <div class="live-terminal">
                    <div id="console-output">
                        </div>
                </div>
            </div>

        </div>

        <div class="warning-tape"></div>

    </div>

    <script>
      
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '0123456789ABCDEF!@#$%^&*()_+{}|:<>?';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) { drops[x] = 1; }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 0, 0, 0.15)';  
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff003c'; 
            ctx.font = fontSize + 'px "JetBrains Mono"';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35); 

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        
        const consoleOutput = document.getElementById('console-output');
        const errorMessages = [
            "KERNEL PANIC - NOT SYNCING",
            "PHYSICAL MEMORY DUMP FAILED",
            "OVERRIDING SECURITY PROTOCOLS... [FAILED]",
            "BREACH DETECTED IN SECTOR 7G",
            "DATA CORRUPTION DETECTED: NODE_GRAVES",
            "CONNECTION LOST TO MAINFRAME",
            "ATTEMPTING TO REBOOT SHADOW.EXE",
            "KILL SWITCH ACTIVATED",
            "TRACE PROGRAM INITIATED"
        ];

        function generateHex() {
            return '0x' + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(6, '0');
        }

        function addLog() {
            const div = document.createElement('div');
            const isCritical = Math.random() > 0.7;
            const hex = generateHex();
            
            if(isCritical) {
                const msg = errorMessages[Math.floor(Math.random() * errorMessages.length)];
                div.innerHTML = `<span class="sys-err">ERR</span> <span class="hex-code">[${hex}]</span> ${msg}`;
            } else {
                let dump = "";
                for(let i=0; i<8; i++) dump += Math.floor(Math.random()*255).toString(16).padStart(2,'0').toUpperCase() + " ";
                div.innerHTML = `<span class="hex-code">[${hex}]</span> ${dump}`;
            }

            consoleOutput.appendChild(div);

            if (consoleOutput.children.length > 15) {
                consoleOutput.removeChild(consoleOutput.firstChild);
            }

            setTimeout(addLog, Math.random() * 200 + 50);
        }

        addLog();
    </script>
</body>
</html>
