<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS - COMMAND CENTER [ADMIN]</title>

    <script>
        const session = JSON.parse(localStorage.getItem('sas_session'));
        if (!session || parseInt(session.rank) < 10) {
            alert("⛔ VIOLATION DE SÉCURITÉ : ACCÈS NIVEAU 10 REQUIS.");
            window.location.href = 'index.html';
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/stylele.css">

    <style>
        /* === VARIABLES & BASE === */
        :root {
            --accent-blue: #00f3ff;
            --accent-danger: #ff3333;
            --accent-warning: #ffcc00;
            --accent-primary: #33ff77;
            --bg-deep: #05080f;
            --text-dim: #8b9bb4;
            --font-code: 'JetBrains Mono', monospace;
            --font-display: 'Share Tech Mono', monospace;
        }

        /* === TABLEAU D'ADMINISTRATION === */
        .cyber-panel-admin {
            background: rgba(15, 5, 5, 0.85); /* Fond légèrement rouge pour l'admin */
            border: 1px solid var(--accent-danger);
            padding: 25px; 
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: inset 0 0 20px rgba(255, 51, 51, 0.05);
            position: relative;
            height: 100%;
            display: flex; flex-direction: column;
        }
        .cyber-panel-admin::before {
            content: ''; position: absolute; top: 0; left: 0; width: 15px; height: 15px;
            background: var(--accent-danger); clip-path: polygon(0 0, 100% 0, 0 100%);
        }

        .admin-table {
            width: 100%; border-collapse: collapse; margin-top: 15px;
            font-family: var(--font-code); font-size: 0.85rem;
        }
        .admin-table th {
            text-align: left; padding: 15px 12px; color: var(--accent-danger);
            border-bottom: 1px dashed var(--accent-danger); letter-spacing: 2px;
            font-family: var(--font-display); font-size: 1rem;
        }
        .admin-table td {
            padding: 12px; border-bottom: 1px solid rgba(255, 51, 51, 0.1);
            color: #e2e8f0; vertical-align: middle; transition: background 0.2s;
        }
        .admin-table tr:hover td { background: rgba(255, 51, 51, 0.05); }

        /* Contrôles de rang */
        .rank-control { display: flex; align-items: center; gap: 12px; }
        .rank-val { font-weight: bold; width: 30px; text-align: center; font-size: 1.1rem; }
        .btn-mini {
            background: rgba(0,0,0,0.5); border: 1px solid var(--text-dim); color: var(--text-dim);
            width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-code); transition: 0.2s; border-radius: 2px;
        }
        .btn-mini:hover { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(0, 243, 255, 0.1); }

        /* Badges de Warn */
        .warn-badge {
            padding: 4px 8px; border-radius: 2px; font-weight: bold; font-size: 0.75rem;
            background: rgba(0,0,0,0.3); border: 1px solid #444; color: #888;
        }
        .warn-critic { color: var(--accent-danger); border-color: var(--accent-danger); background: rgba(255, 51, 51, 0.1); animation: blinkRed 2s infinite; }
        @keyframes blinkRed { 0%, 100% {opacity: 1;} 50% {opacity: 0.6; box-shadow: 0 0 10px var(--accent-danger);} }

        /* Bouton d'action WARN */
        .btn-warn {
            border: 1px solid var(--accent-warning); color: var(--accent-warning);
            padding: 6px 12px; font-size: 0.75rem; background: rgba(255, 204, 0, 0.05); cursor: pointer;
            font-family: var(--font-code); transition: all 0.2s ease;
        }
        .btn-warn:hover { background: var(--accent-warning); color: #000; box-shadow: 0 0 10px var(--accent-warning); }

        /* === MODALE OVERRIDE === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }

        .modal-box {
            background: #0b0e11;
            border: 1px solid var(--accent-danger);
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.15), inset 0 0 20px rgba(255, 51, 51, 0.1);
            width: 500px; max-width: 90%;
            display: flex; flex-direction: column; position: relative;
        }
        
        .modal-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: repeating-linear-gradient(45deg, var(--accent-danger), var(--accent-danger) 10px, transparent 10px, transparent 20px);
        }

        .modal-top {
            padding: 20px 25px 15px; border-bottom: 1px solid rgba(255, 51, 51, 0.2);
            background: rgba(255, 51, 51, 0.05); display: flex; justify-content: space-between; align-items: center;
        }

        .modal-title { font-family: var(--font-display); color: var(--accent-danger); letter-spacing: 2px; font-weight: bold; font-size: 1.2rem; }

        /* Formulaire dans la modale */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; color: var(--text-dim); font-size: 0.75rem; margin-bottom: 5px;
            font-family: var(--font-display); letter-spacing: 1px;
        }
        .form-input, .form-textarea {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--accent-blue);
            padding: 10px; font-family: var(--font-code); outline: none; transition: 0.3s;
        }
        .form-input:disabled { color: var(--text-dim); border-color: rgba(255,255,255,0.05); }
        .form-input:focus, .form-textarea:focus { border-color: var(--accent-danger); box-shadow: 0 0 10px rgba(255, 51, 51, 0.2); color: #fff; }

        .btn-tactical {
            background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue);
            padding: 10px 20px; font-family: var(--font-code); cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-size: 0.8rem; letter-spacing: 1px;
        }
        .btn-tactical.danger { border-color: var(--accent-danger); color: var(--accent-danger); }
        .btn-tactical.danger:hover { background: var(--accent-danger); color: #000; box-shadow: 0 0 15px var(--accent-danger); }
        .btn-tactical.secondary { border-color: var(--text-dim); color: var(--text-dim); }
        .btn-tactical.secondary:hover { border-color: #fff; color: #fff; }

        /* Utilitaires pour coller au design existant */
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="logged-in">

<div class="tactical-grid" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="radar-scan" aria-hidden="true"></div>

<div class="hud-side hud-left" aria-hidden="true">
    <div class="hud-ruler"></div>
    <div class="hud-marker">SYS.OVERWATCH</div>
    <div class="hud-marker" style="color:var(--accent-danger)">ADMIN_LINK</div>
    <div class="hud-ruler"></div>
</div>
<div class="hud-side hud-right" aria-hidden="true">
    <div class="hud-ruler"></div>
    <div class="hud-marker">ROOT.ACCESS</div>
    <div class="hud-marker">127.0.0.1</div>
    <div class="hud-ruler"></div>
</div>

<div class="terminal-wrapper">
    <main class="terminal">

        <header class="header-strip" style="border-bottom-color: var(--accent-danger); margin-bottom: 20px;">
            <div>
                <h1 style="font-family: var(--font-display); margin: 0; font-size: 2.2rem; letter-spacing: 2px;">
                    COMMAND :: <span style="color: var(--accent-danger);">OVERWATCH</span>
                </h1>
                <div style="color: var(--accent-danger); font-size: 0.85rem; letter-spacing: 3px; font-family: var(--font-code); margin-top: 5px;">ADMINISTRATION PERSONNEL</div>
            </div>
            <div class="meta-data" style="text-align: right; font-family: var(--font-code); font-size: 0.85rem; line-height: 1.5;">
                <div>ADMIN_ID: <span style="color: var(--accent-blue)" id="admin-name" class="blink">...</span></div>
                <a href="index.html" style="color: var(--text-dim); text-decoration: none; display: inline-block; margin-top: 5px; border-bottom: 1px solid var(--text-dim); padding-bottom: 2px;">[ RETOUR SYSTÈME ]</a>
            </div>
        </header>

        <section style="flex: 1; height: calc(100vh - 200px);">
            <div class="cyber-panel-admin">
                
                <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                    <span style="font-family: var(--font-display); color: #fff; font-size: 1.2rem; letter-spacing: 1px;">LISTE DES AGENTS ACTIFS</span>
                    <div style="font-size: 0.75rem; color: var(--accent-blue); font-family: var(--font-code);">LIVE DATABASE UPDATE <span class="blink">_</span></div>
                </div>

                <div style="overflow-y: auto; flex: 1; padding-right: 10px; margin-top: 10px;">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>AGENT</th>
                            <th>ID UNIQUE</th>
                            <th>HIÉRARCHIE (RANK)</th>
                            <th>DISCIPLINE (WARNS)</th>
                            <th style="text-align: right;">OVERRIDE</th>
                        </tr>
                        </thead>
                        <tbody id="agents-list">
                        <tr><td colspan="5" style="text-align:center; padding:40px; color: var(--text-dim);">EXTRACTION DES DONNÉES RÉSEAU...</td></tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </section>

    </main>
</div>

<div id="warn-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-top">
            <span class="modal-title">PROCÉDURE DISCIPLINAIRE</span>
            <button onclick="closeWarnModal()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size: 1.5rem; transition: 0.2s;">&times;</button>
        </div>
        <form id="warn-form" style="padding: 25px;">
            <input type="hidden" id="warn-agent-id">
            
            <div class="form-group">
                <label>AGENT CIBLE</label>
                <input type="text" id="warn-agent-name" class="form-input" disabled>
            </div>
            
            <div class="form-group">
                <label>MOTIF DE LA SANCTION</label>
                <textarea id="warn-reason" class="form-textarea" style="height:120px; resize: none;" placeholder="Ex: Insubordination lors de l'OP Blackout..."></textarea>
            </div>
            
            <div style="display:flex; justify-content:flex-end; gap:15px; margin-top:25px;">
                <button type="button" onclick="closeWarnModal()" class="btn-tactical secondary">ANNULER</button>
                <button type="submit" class="btn-tactical danger">CONFIRMER SANCTION</button>
            </div>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('sas_token');
    const currentUser = JSON.parse(localStorage.getItem('sas_session'));
    if(currentUser && currentUser.username) {
        document.getElementById('admin-name').textContent = currentUser.username.toUpperCase();
    }

    document.addEventListener('DOMContentLoaded', loadAgents);

    async function loadAgents() {
        try {
            const res = await fetch('/api/admin', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 403) {
                alert("ACCÈS REFUSÉ");
                window.location.href = 'index.html';
                return;
            }

            const agents = await res.json();
            renderTable(agents);
        } catch (e) {
            console.error(e);
            document.getElementById('agents-list').innerHTML = `<tr><td colspan="5" style="color:var(--accent-danger); text-align:center; padding: 40px;">ERREUR DE CONNEXION AU SERVEUR MAINFRAME</td></tr>`;
        }
    }

    function renderTable(agents) {
        const tbody = document.getElementById('agents-list');
        tbody.innerHTML = '';

        agents.forEach(agent => {
            const warnCount = parseInt(agent.warn_count);
            let warnHtml = `<span class="warn-badge" style="color: var(--accent-primary); border-color: rgba(51, 255, 119, 0.3);">[OK] 0/3</span>`;

            if (warnCount > 0 && warnCount < 3) {
                warnHtml = `<span class="warn-badge" style="color:var(--accent-warning); border-color:var(--accent-warning)">[WARN] ${warnCount}/3</span>`;
            } else if (warnCount >= 3) {
                warnHtml = `<span class="warn-badge warn-critic">[CRITIQUE] ${warnCount}/3</span>`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                    <td style="font-weight:bold; color:#fff; font-size: 0.95rem;">${agent.username.toUpperCase()}</td>
                    <td style="color:var(--text-dim);">#00${agent.id}</td>
                    <td>
                        <div class="rank-control">
                            <button class="btn-mini" onclick="updateRank(${agent.id}, ${agent.rank}, -1)">-</button>
                            <span class="rank-val" style="color:${getRankColor(agent.rank)}; text-shadow: 0 0 5px ${getRankColor(agent.rank)}">${agent.rank}</span>
                            <button class="btn-mini" onclick="updateRank(${agent.id}, ${agent.rank}, 1)">+</button>
                        </div>
                    </td>
                    <td>${warnHtml}</td>
                    <td style="text-align: right;">
                        <button class="btn-warn" onclick="openWarnModal(${agent.id}, '${agent.username}')">[ ! WARN ]</button>
                    </td>
                `;
            tbody.appendChild(row);
        });
    }

    // Adapté aux variables du style CSS actuel
    function getRankColor(rank) {
        if(rank >= 10) return 'var(--accent-danger)';
        if(rank >= 5) return 'var(--accent-warning)';
        if(rank >= 3) return 'var(--text-dim)';
        return 'var(--accent-blue)';
    }

    async function updateRank(id, currentRank, change) {
        const newRank = parseInt(currentRank) + change;
        if(newRank < 0) return;

        try {
            const res = await fetch('/api/admin', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ agent_id: id, new_rank: newRank })
            });

            if(res.ok) {
                loadAgents();
            } else {
                alert("Erreur lors de la mise à jour du grade.");
            }
        } catch(e) { console.error(e); }
    }

    function openWarnModal(id, username) {
        document.getElementById('warn-agent-id').value = id;
        document.getElementById('warn-agent-name').value = username.toUpperCase();
        document.getElementById('warn-reason').value = '';

        const modal = document.getElementById('warn-modal');
        modal.classList.remove('hidden');
        modal.style.display = 'flex';
    }

    function closeWarnModal() {
        const modal = document.getElementById('warn-modal');
        modal.classList.add('hidden');
        modal.style.display = 'none'; 
    }

    document.getElementById('warn-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('warn-agent-id').value;
        const reason = document.getElementById('warn-reason').value;

        if(!reason.trim()) { alert("Le motif est obligatoire pour valider la sanction."); return; }

        try {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ agent_id: id, reason: reason })
            });

            if(res.ok) {
                closeWarnModal();
                loadAgents();
            } else {
                alert("Erreur lors de l'ajout de l'avertissement au dossier.");
            }
        } catch(e) { console.error(e); }
    });
</script>
</body>
</html>
