<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS MAINFRAME // TACTICAL MAP</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/stylele.css">

    <style>
        /* On force le fond à être transparent pour ne pas cacher la carte */
        body { margin: 0; padding: 0; overflow: hidden; background: transparent !important; }
        
        /* La carte est au niveau 1 */
        #map { 
            position: fixed; top: 0; left: 0; height: 100vh; width: 100vw; 
            background: #05080a; z-index: 1; 
        }

        /* On force les effets du thème à passer PAR-DESSUS la carte */
        .tactical-grid { z-index: 10 !important; }
        .vignette { z-index: 11 !important; }
        .radar-scan { z-index: 12 !important; }
        .hud-side { z-index: 13 !important; }

        /* Couche UI tout au-dessus */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; padding: 25px;
        }

        .map-header {
            pointer-events: auto;
            display: inline-block;
            background: rgba(5, 8, 10, 0.85);
            padding: 15px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid var(--accent-primary);
            backdrop-filter: blur(5px);
        }

        .map-sidebar {
            position: absolute; top: 25px; right: 25px; width: 320px;
            pointer-events: auto; height: auto;
            border-bottom: none; border-top: 2px solid var(--accent-primary);
        }

        .tool-btn-map {
            width: 100%; justify-content: flex-start; margin-bottom: 10px;
        }

        .tool-btn-map.active {
            background: rgba(0, 255, 157, 0.2);
            border-color: var(--accent-primary);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
            transform: translateX(5px);
        }

        /* Bouton de validation flottant */
        #finish-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            pointer-events: auto; display: none;
        }
        
        .finish-btn {
            background: var(--accent-primary); color: #000; font-weight: bold;
            border: none; padding: 12px 24px; font-family: var(--font-code); 
            cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 157, 0.4); 
            font-size: 1rem; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: 0.3s;
        }
        .finish-btn:hover { transform: scale(1.05); background: #fff; }

        /* Styles de la popup Leaflet adaptés au thème */
        .leaflet-popup-content-wrapper {
            background: rgba(10, 14, 18, 0.95); border: 1px solid var(--accent-primary);
            color: #fff; font-family: var(--font-code); border-radius: 0;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
        }
        .leaflet-popup-tip { background: var(--accent-primary); }
        .leaflet-popup-close-button { color: var(--accent-primary) !important; text-decoration: none !important;}

        /* Modal Sauvegarde */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            z-index: 3000; display: none; justify-content: center; align-items: center;
            pointer-events: auto;
        }
        .modal-window {
            background: var(--bg-panel); border: 1px solid var(--accent-primary);
            width: 100%; max-width: 400px; padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.15);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="tactical-grid" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="radar-scan" aria-hidden="true"></div>

<div class="hud-side hud-left" aria-hidden="true">
    <div class="hud-ruler"></div>
    <div class="hud-marker">SYS.CARTOGRAPHY</div>
    <div class="hud-marker" style="color:var(--accent-primary)">LIVE_FEED</div>
    <div class="hud-ruler"></div>
</div>
<div class="hud-side hud-right" aria-hidden="true">
    <div class="hud-ruler"></div>
    <div class="hud-marker">SAT.UPLINK</div>
    <div class="hud-marker">128.0.0.1</div>
    <div class="hud-ruler"></div>
</div>

<div class="ui-layer">

    <div class="map-header">
        <h1>TACTICAL <span>MAP</span></h1>
        <div class="sub-header" style="margin-bottom: 10px;">SATELLITE FEED // SECTOR 7</div>
        <a href="index.html" class="btn-connect" style="text-decoration:none; display:inline-block;">< RETOUR MAINFRAME</a>
    </div>

    <div class="sidebar-panel map-sidebar">
        <h3 style="margin: 0 0 15px 0; color: var(--accent-primary); font-family: var(--font-display); letter-spacing: 2px;">OUTILS_TACTIQUES</h3>
        <div class="separator-line" style="margin-bottom: 15px;"></div>

        <button class="btn-connect tool-btn-map active" onclick="selectTool('nav')">✋ NAVIGATION</button>
        <button class="btn-connect tool-btn-map" onclick="selectTool('marker')">📍 MARQUEUR TACTIQUE</button>
        <button class="btn-connect tool-btn-map" onclick="selectTool('line')">➖ TRACER TRAJET</button>
        <button class="btn-connect tool-btn-map" onclick="selectTool('polygon')">⬢ DÉLIMITER ZONE</button>

        <div style="font-size:0.65rem; color:var(--text-dim); margin-top:15px; font-family: var(--font-code);">
            > CLIQUEZ SUR LA CARTE POUR PLACER DES POINTS.
        </div>
    </div>

    <div id="finish-container">
        <button class="finish-btn" onclick="finishDrawing()">[ EXECUTER LE TRACÉ ]</button>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-window">
            <div class="terminal-header" style="display:flex; justify-content:space-between; border-bottom:1px dashed var(--accent-primary); padding-bottom:10px; margin-bottom:20px;">
                <span style="font-family: var(--font-code); font-weight: bold; color: var(--accent-primary);">SAISIE_DONNÉES_CIBLE</span>
            </div>
            
            <input type="text" id="descInput" class="cmd-input" style="margin-bottom:15px;" placeholder="Désignation (ex: Hostiles)..." autocomplete="off">

            <select id="levelInput" class="cmd-input" style="margin-bottom:20px;">
                <option value="low">MENACE FAIBLE (Vert)</option>
                <option value="mid">MENACE MOYENNE (Jaune)</option>
                <option value="high">MENACE CRITIQUE (Rouge)</option>
            </select>

            <div style="display:flex; gap:10px; flex-direction:column;">
                <button onclick="saveShape()" class="btn-connect" style="width:100%; justify-content:center;">[ CONFIRMER LES DONNÉES ]</button>
                <button onclick="cancelShape()" class="btn-connect" style="width:100%; justify-content:center; color:var(--accent-danger); border-color:rgba(255,51,51,0.4);">[ ABORT ]</button>
            </div>
        </div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    const mapWidth = 8192;
    const mapHeight = 8192;
    const mapUrl = 'assets/carte.jpg';

    let map;
    let currentTool = 'nav';
    let tempShape = null;
    let tempPoints = [];
    let drawnItems = [];

    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        loadData();
        setInterval(loadData, 4000);
    });

    function initMap() {
        map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom: 2,
            zoomControl: false,
            doubleClickZoom: false
        });

        const bounds = [[0, 0], [mapHeight, mapWidth]];
        L.imageOverlay(mapUrl, bounds).addTo(map);
        map.fitBounds(bounds);

        map.on('click', onMapClick);
    }

    function selectTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn-map').forEach(b => b.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active'); 

        document.getElementById('map').style.cursor = (tool === 'nav') ? 'grab' : 'crosshair';

        resetDrawing();
    }

    function onMapClick(e) {
        if (currentTool === 'nav') return;

        if (currentTool === 'marker') {
            openModal('marker', [e.latlng]);
        }
        else if (currentTool === 'line' || currentTool === 'polygon') {
            tempPoints.push(e.latlng);
            drawTempShape();

            if (tempPoints.length > 0) {
                document.getElementById('finish-container').style.display = 'block';
            }
        }
    }

    function finishDrawing() {
        if (tempPoints.length < 2) {
            alert("ERREUR: IL FAUT AU MOINS 2 POINTS.");
            return;
        }
        openModal(currentTool, tempPoints);
    }

    function drawTempShape() {
        if (tempShape) map.removeLayer(tempShape);

        if (currentTool === 'line') {
            tempShape = L.polyline(tempPoints, {color: '#fff', dashArray: '5, 5'}).addTo(map);
        } else if (currentTool === 'polygon') {
            tempShape = L.polygon(tempPoints, {color: '#fff', dashArray: '5, 5'}).addTo(map);
        }
    }

    function resetDrawing() {
        if (tempShape) map.removeLayer(tempShape);
        tempShape = null;
        tempPoints = [];
        document.getElementById('finish-container').style.display = 'none';
    }

    let pendingSave = null;

    function openModal(type, latlngs) {
        pendingSave = { type, latlngs };
        // Affichage Flex pour centrer la modale proprement
        document.getElementById('infoModal').style.display = 'flex';
        document.getElementById('descInput').focus();
        document.getElementById('finish-container').style.display = 'none';
    }

    function cancelShape() {
        document.getElementById('infoModal').style.display = 'none';
        resetDrawing();
        pendingSave = null;
    }

    async function saveShape() {
        if(!pendingSave) return;

        const desc = document.getElementById('descInput').value || 'Zone Non Identifiée';
        const level = document.getElementById('levelInput').value;
        
        let author = 'AGENT INCONNU';
        try {
            const sessionData = localStorage.getItem('sas_session');
            if (sessionData) {
                const session = JSON.parse(sessionData);
                author = session.username || author;
            }
        } catch(err) { console.error(err); }

        const payload = {
            type: pendingSave.type,
            data: {
                latlngs: pendingSave.latlngs,
                desc: desc,
                level: level,
                author: author
            }
        };

        try {
            await fetch('/api/game?entity=markers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            cancelShape();
            document.getElementById('descInput').value = ''; // Reset input
            loadData();
        } catch(e) {
            alert("Erreur système lors de l'enregistrement.");
        }
    }

    async function loadData() {
        try {
            const res = await fetch('/api/game?entity=markers');
            if(!res.ok) return;
            const items = await res.json();

            drawnItems.forEach(layer => map.removeLayer(layer));
            drawnItems = [];

            items.forEach(item => {
                const { latlngs, desc, level, author } = item.data;
                let layer;
                
                // Couleurs du thème : primary, warning, danger
                let color = '#00ff9d'; // Low
                if(level === 'mid') color = '#eebb00'; // Mid
                if(level === 'high') color = '#ff3333'; // High

                if (item.type === 'marker') {
                    const pos = Array.isArray(latlngs) ? latlngs[0] : latlngs;
                    const iconHtml = `<div style="width:14px; height:14px; background:${color}; border-radius:50%; box-shadow:0 0 15px ${color}; border:2px solid #fff;"></div>`;
                    const customIcon = L.divIcon({ className: 'custom-pin', html: iconHtml, iconSize: [18, 18], iconAnchor: [9, 9] });
                    layer = L.marker(pos, {icon: customIcon});
                }
                else if (item.type === 'line') {
                    layer = L.polyline(latlngs, {color: color, weight: 3, opacity: 0.8});
                }
                else if (item.type === 'polygon') {
                    layer = L.polygon(latlngs, {color: color, fillColor: color, fillOpacity: 0.2, weight: 2});
                }

                if(layer) {
                    const popupContent = `
                            <div style="font-family: 'Share Tech Mono', monospace; font-size:1.1em; border-bottom:1px solid ${color}; padding-bottom:5px; margin-bottom:5px; color:${color}; font-weight:bold; letter-spacing:1px;">
                                ${desc.toUpperCase()}
                            </div>
                            <div style="font-size:0.8em; color:#888;">AJOUTÉ PAR : <span style="color:#fff;">${author}</span></div>
                            <button onclick="deleteItem(${item.id})" style="background:transparent; border:1px dashed #ff3333; color:#ff3333; font-family:'JetBrains Mono'; font-size:0.7em; margin-top:10px; padding:5px; cursor:pointer; width:100%;">[ EFFACER ]</button>
                        `;
                    layer.bindPopup(popupContent);
                    layer.addTo(map);
                    drawnItems.push(layer);
                }
            });
        } catch(e) { console.error("Erreur de synchronisation carte:", e); }
    }

    window.deleteItem = async function(id) {
        if(confirm("CONFIRMER LA SUPPRESSION DE CETTE DONNÉE TACTIQUE ?")) {
            await fetch('/api/game?entity=markers', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            map.closePopup();
            loadData();
        }
    }
</script>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script src="js/broadcast.js"></script>
</body>
</html>
