<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS MAINFRAME // LIAISON NEURONALE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Scripts de communication temps réel -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/script.js" defer></script>

    <style>
        :root {
            --accent-primary:    #00ff9d;
            --accent-secondary:  #00b8ff;
            --accent-danger:      #ff2a2a;
            --accent-restricted: #ffaa00;
            --font-code:    'JetBrains Mono', monospace;
            --font-display: 'Share Tech Mono', monospace;
            --bg-glass:     rgba(6, 10, 15, 0.65);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #050914 0%, #010203 100%);
            color: #fff;
            font-family: var(--font-display);
        }

        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none; z-index: 999; opacity: 0.6;
        }

        .vignette {
            position: fixed; inset: 0;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none; z-index: 998;
        }

        /* États d'affichage Auth */
        .auth-content { display: none !important; }
        body.logged-in .auth-content { display: flex !important; }
        body.logged-in #login-overlay { display: none !important; }

        #neural-network {
            position: fixed; inset: 0;
            z-index: 0; opacity: 0.6;
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px;
            padding: 0; margin: -1px; overflow: hidden;
            clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }

        /* --- LOGIN BOX --- */
        #login-overlay {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            position: relative; z-index: 10;
        }

        .login-box {
            background: var(--bg-glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50%;
            width: min(380px, 88vw); height: min(380px, 88vw);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.1), inset 0 0 20px rgba(0, 255, 157, 0.05);
            animation: systemBoot 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards, floatAnim 6s ease-in-out 1.5s infinite;
        }

        .login-box::before {
            content: ''; position: absolute; inset: -2px; border-radius: 50%;
            background: linear-gradient(45deg, transparent, var(--accent-primary), transparent, var(--accent-secondary));
            z-index: -1; animation: spinBg 4s linear infinite; opacity: 0.5;
        }

        .login-title {
            font-family: var(--font-code); font-size: clamp(0.85rem, 3vw, 1.3rem);
            color: #fff; text-align: center; letter-spacing: 3px; margin-bottom: 20px;
            text-shadow: 0 0 15px var(--accent-primary);
        }

        .cmd-input {
            width: 82%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px; color: var(--accent-primary); padding: 10px;
            text-align: center; font-family: var(--font-code); outline: none; transition: all 0.3s ease;
        }

        .cmd-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 15px rgba(0, 255, 157, 0.3); }

        .btn-connect {
            background: rgba(0, 255, 157, 0.1); color: var(--accent-primary);
            border: 1px solid var(--accent-primary); padding: 12px 25px;
            font-family: var(--font-code); font-weight: bold; cursor: pointer;
            transition: all 0.3s; margin-top: 15px; border-radius: 30px; text-transform: uppercase;
        }

        .btn-connect:hover { background: var(--accent-primary); color: #000; box-shadow: 0 0 25px var(--accent-primary); scale: 1.05; }

        /* --- HUD --- */
        .hud-overlay {
            position: fixed; top: 30px; left: 30px; pointer-events: none; z-index: 100;
            border-left: 3px solid var(--accent-primary); padding: 10px 20px;
            background: linear-gradient(90deg, rgba(0,255,157,0.1) 0%, transparent 100%);
        }

        .hud-top-right { position: fixed; top: 30px; right: 30px; z-index: 100; display: flex; align-items: center; gap: 15px; }
        .hud-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--accent-primary); }

        /* --- LOGS --- */
        .system-logs-container { position: fixed; bottom: 30px; left: 30px; width: 320px; z-index: 100; font-family: var(--font-code); font-size: 0.7rem; }
        .log-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column-reverse; gap: 6px; }
        .log-item { background: rgba(0, 255, 157, 0.05); border-left: 2px solid var(--accent-primary); padding: 5px 10px; animation: logIn 0.3s forwards; }
        .log-item.alert { border-color: var(--accent-danger); color: var(--accent-danger); }
        .log-time { opacity: 0.5; margin-right: 8px; font-size: 0.6rem; }

        /* --- DASHBOARD & NODES --- */
        .neural-dashboard { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .orbit { position: absolute; top: 50%; left: 50%; translate: -50% -50%; border-radius: 50%; pointer-events: none; }
        .orbit-1 { width: 50vmin; height: 50vmin; border: 1px dashed rgba(0, 255, 157, 0.15); }
        .orbit-2 { width: 75vmin; height: 75vmin; border: 1px dashed rgba(255, 170, 0, 0.15); }
        .orbit-10 { width: 95vmin; height: 95vmin; border: 1px dashed rgba(255, 42, 42, 0.15); }

        .node {
            position: absolute; top: 50%; left: 50%; border-radius: 50%;
            background: var(--bg-glass); backdrop-filter: blur(8px); border: 1px solid rgba(0, 255, 157, 0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; color: #fff; padding: 10px;
        }

        .node-core { width: clamp(120px, 20vmin, 180px); height: clamp(120px, 20vmin, 180px); translate: -50% -50%; border: 2px solid var(--accent-primary); }
        
        .node-sub { 
            width: clamp(75px, 14vmin, 110px); height: clamp(75px, 14vmin, 110px);
            translate: calc(-50% + sin(var(--angle, 0deg)) * var(--orbit, 25vmin)) 
                       calc(-50% - cos(var(--angle, 0deg)) * var(--orbit, 25vmin));
        }

        .node-locked { opacity: 0.4; filter: saturate(0); cursor: not-allowed; }
        .lock-badge { display: none; position: absolute; top: 5px; right: 5px; font-size: 0.7rem; }
        .node-locked .lock-badge { display: block; }

        /* Stats & Alertes */
        .node-stat { position: absolute; bottom: 8px; font-family: var(--font-code); font-size: 0.55rem; text-align: center; }
        .node-stat-val { display: block; font-weight: bold; font-size: 0.75rem; }
        .node-alert { 
            position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; 
            border-radius: 50%; background: var(--accent-danger); opacity: 0; 
            animation: pulseBadge 2s infinite; 
        }
        .node-alert.visible { opacity: 1; }

        /* Tooltip */
        #node-tooltip {
            position: fixed; background: rgba(4, 8, 12, 0.95); border: 1px solid var(--accent-restricted);
            color: var(--accent-restricted); padding: 6px 12px; font-family: var(--font-code);
            font-size: 0.65rem; border-radius: 4px; pointer-events: none; opacity: 0; z-index: 1000;
        }
        #node-tooltip.visible { opacity: 1; }

        /* SVG Connections */
        .synapse-lines { position: absolute; width: 100vmin; height: 100vmin; pointer-events: none; }
        .synapse-lines line { stroke: rgba(0, 255, 157, 0.2); stroke-width: 1; stroke-dasharray: 5; animation: dataFlow 20s linear infinite; }

        @keyframes dataFlow { to { stroke-dashoffset: -500; } }
        @keyframes pulseBadge { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.4); opacity: 1; } }
        @keyframes systemBoot { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes logIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spinBg { to { rotate: 360deg; } }
        @keyframes floatAnim { 0%, 100% { margin-top: 0; } 50% { margin-top: -8px; } }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <canvas id="neural-network"></canvas>
    <div id="node-tooltip"></div>

    <!-- ÉCRAN DE CONNEXION -->
    <section id="login-overlay">
        <div class="login-box">
            <div class="login-title">>_ LIAISON SYNAPTIQUE</div>
            <div style="width: 100%; text-align: center; margin-bottom: 10px;">
                <input type="text" id="login-username" class="cmd-input" placeholder="[ EMPREINTE_CORTICALE ]" autocomplete="off">
            </div>
            <div style="width: 100%; text-align: center; margin-bottom: 10px;">
                <input type="password" id="login-password" class="cmd-input" placeholder="[ SOUCHE_MÉMORIELLE ]">
            </div>
            <div id="login-msg" style="font-size: 0.7rem; color: var(--accent-danger); height: 15px;"></div>
            <button class="btn-connect" onclick="handleLogin()">INITIER L'UPLINK</button>
        </div>
    </section>

    <!-- HUD INTERFACE -->
    <div class="hud-overlay auth-content">
        <div class="hud-title">SAS // <span style="color: var(--accent-primary)">MAINFRAME</span></div>
        <div style="font-size: 0.8rem; color: var(--accent-primary)">> CONNEXION ÉTABLIE</div>
        <div style="font-size: 0.7rem; margin-top: 5px; opacity: 0.8;">
            AGENT: <span id="mini-username">---</span> | RANG: <span id="mini-rank">LVL-0</span>
        </div>
    </div>

    <div class="hud-top-right auth-content">
        <img id="sidebar-avatar" src="assets/default.jpg" class="hud-avatar" alt="Avatar">
        <button class="btn-connect" style="font-size: 0.6rem; padding: 5px 15px;" onclick="logout()">DÉCONNEXION</button>
    </div>

    <!-- LOGS SYSTÈME -->
    <div class="system-logs-container auth-content">
        <ul id="system-logs" class="log-list"></ul>
    </div>

    <!-- DASHBOARD NEURONAL -->
    <div class="neural-dashboard auth-content">
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
        <div class="orbit orbit-10"></div>

        <svg class="synapse-lines">
            <line x1="50%" y1="50%" x2="50%" y2="25%" />
            <line x1="50%" y1="50%" x2="75%" y2="50%" />
            <line x1="50%" y1="50%" x2="25%" y2="50%" />
        </svg>

        <!-- NOYAU -->
        <button class="node node-core" onclick="accessModule('profile.html', 0)">
            <span style="font-size: 2.5rem;">🧠</span>
            <span style="font-weight: bold; font-size: 0.7rem; letter-spacing: 1px;">NOYAU CENTRAL</span>
        </button>

        <!-- ORBITE 1 (LVL 1) -->
        <button class="node node-sub" style="--angle:30deg; --orbit:25vmin;" onclick="accessModule('database.html', 1)" data-required-level="1">
            <span class="lock-badge">🔒</span><span>👥</span><span class="label">AGENTS</span>
            <span class="node-stat" id="stat-agents"><span class="node-stat-val" id="stat-agents-val">—</span>OPS</span>
        </button>

        <button class="node node-sub" style="--angle:90deg; --orbit:25vmin;" onclick="accessModule('missions.html', 1)" data-required-level="1">
            <span class="lock-badge">🔒</span><span>🗓️</span><span class="label">MISSIONS</span>
            <span class="node-stat" id="stat-missions"><span class="node-stat-val" id="stat-missions-val">—</span>LIVE</span>
            <span class="node-alert" id="alert-missions"></span>
        </button>

        <button class="node node-sub" style="--angle:150deg; --orbit:25vmin;" onclick="accessModule('logistics.html', 1)" data-required-level="1">
            <span class="lock-badge">🔒</span><span>📦</span><span class="label">MATÉRIEL</span>
            <span class="node-stat" id="stat-gear"><span class="node-stat-val" id="stat-gear-val">—</span>UNIT</span>
            <span class="node-alert" id="alert-gear"></span>
        </button>

        <!-- NOUVEAU NOEUD COMMS (ORBITE 2) -->
        <button class="node node-sub" data-orbit="2" style="--angle:270deg; --orbit:37.5vmin;" onclick="accessModule('messages.html', 1)" data-required-level="1">
            <span class="lock-badge">🔒</span><span>📡</span><span class="label">COMMS</span>
            <span class="node-stat" id="stat-comms"><span class="node-stat-val" id="stat-comms-val">—</span>LIVE</span>
            <span class="node-alert" id="alert-comms"></span>
        </button>

        <!-- ORBITE 2 (LVL 2) -->
        <button class="node node-sub" style="--angle:0deg; --orbit:37.5vmin;" onclick="accessModule('investigation.html', 2)" data-required-level="2" data-tooltip="Accréditation LVL-2 requise">
            <span class="lock-badge">🔒</span><span>🔍</span><span class="label">ENQUÊTES</span>
        </button>

        <!-- ORBITE 10 (ADMIN) -->
        <button class="node node-sub" style="--angle:45deg; --orbit:47.5vmin; border-color: var(--accent-danger);" onclick="accessModule('admin.html', 10)" data-required-level="10" data-tooltip="CLASSIFIED - LVL-10">
            <span class="lock-badge">🔒</span><span>👁️</span><span class="label">ADMIN</span>
        </button>
    </div>

    <script>
        /* --- LOGIQUE CANVAS (NEURONES) --- */
        const canvas = document.getElementById('neural-network');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 255, 157, 0.5)";
            particles.forEach(p => {
                p.update();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize(); initParticles(); animate();

        /* --- LOGIQUE SYSTÈME & NOTIFICATIONS --- */
        
        // Simule le succès du login (appelé par script.js normalement)
        // Note: Ajoutez SAS_NOTIFY.init(agent.username); loadActivityFeed(); dans votre fonction unlockInterface réelle.

        window._activityFeedUpdate = function(data) {
            const typeMap = { WARNING: 'alert', RANK_CHANGE: 'warning', MISSION_CREATED: 'info' };
            const logList = document.getElementById('system-logs');
            if (!logList) return;
            
            const li = document.createElement('li');
            li.className = `log-item ${typeMap[data.action_type] || 'info'}`;
            const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${data.details}</span>`;
            
            logList.insertBefore(li, logList.firstChild);
            if (logList.children.length > 12) logList.removeChild(logList.lastChild);
        };

        async function loadActivityFeed() {
            const token = localStorage.getItem('sas_token');
            if (!token) return;
            try {
                const res = await fetch('/api/activity', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return;
                const logs = await res.json();
                const logList = document.getElementById('system-logs');
                if (!logList) return;
                logList.innerHTML = '';
                
                logs.slice(0, 10).forEach(log => {
                    const li = document.createElement('li');
                    li.className = `log-item`;
                    const time = new Date(log.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                    li.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${log.details}</span>`;
                    logList.appendChild(li);
                });
            } catch (e) { console.warn('Activity feed error:', e); }
        }

        /* --- TOOLTIPS --- */
        const tooltip = document.getElementById('node-tooltip');
        document.querySelectorAll('.node[data-tooltip]').forEach(node => {
            node.addEventListener('mouseenter', () => {
                tooltip.textContent = node.dataset.tooltip;
                tooltip.classList.add('visible');
            });
            node.addEventListener('mousemove', e => {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY - 15) + 'px';
            });
            node.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
        });

        /* --- STATS REFRESH --- */
        async function loadNodeStats() {
            const token = localStorage.getItem('sas_token');
            if (!token) return;
            const h = { 'Authorization': `Bearer ${token}` };

            try {
                // Exemple Missions
                const resM = await fetch('/api/game?entity=missions', { headers: h });
                if (resM.ok) {
                    const data = await resM.json();
                    const active = data.filter(m => m.status === 'ACTIVE').length;
                    document.getElementById('stat-missions-val').textContent = active;
                    document.getElementById('alert-missions').classList.toggle('visible', active > 0);
                }
            } catch(e) {}
        }

        // Observer pour lancer les services au login
        const observer = new MutationObserver(() => {
            if (document.body.classList.contains('logged-in')) {
                loadActivityFeed();
                loadNodeStats();
                setInterval(loadNodeStats, 30000);
                
                // Init Pusher via votre notifications.js
                const session = JSON.parse(localStorage.getItem('sas_session') || '{}');
                if(window.SAS_NOTIFY) SAS_NOTIFY.init(session.username);
            }
        });
        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    </script>
</body>
</html>
