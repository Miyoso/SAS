<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS MAINFRAME // LIAISON NEURONALE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="js/notifications.js"></script>
    <style>
        :root {
            --accent-primary:    #00ff9d;
            --accent-secondary:  #00b8ff;
            --accent-danger:     #ff2a2a;
            --accent-restricted: #ffaa00;
            --font-code:    'JetBrains Mono', monospace;
            --font-display: 'Share Tech Mono', monospace;
            --bg-glass:     rgba(6, 10, 15, 0.65);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #050914 0%, #010203 100%);
            color: #fff;
            font-family: var(--font-display);
        }
        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom,
                rgba(255,255,255,0), rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none; z-index: 999; opacity: 0.6;
        }
        .vignette {
            position: fixed; inset: 0;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none; z-index: 998;
        }

        .auth-content                { display: none !important; }
        body.logged-in .auth-content { display: flex !important; }
        body.logged-in #login-overlay { display: none !important; }

        #neural-network {
            position: fixed; inset: 0;
            z-index: 0; opacity: 0.6;
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px;
            padding: 0; margin: -1px; overflow: hidden;
            clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }

        #login-overlay {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            position: relative; z-index: 10;
        }
        .login-box {
            background: var(--bg-glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50%;
            width: min(380px, 88vw); height: min(380px, 88vw);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.1), inset 0 0 20px rgba(0, 255, 157, 0.05);
            animation: systemBoot 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                       floatAnim 6s ease-in-out 1.5s infinite;
            will-change: transform;
        }
        .login-box::before {
            content: ''; position: absolute; inset: -2px;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent, var(--accent-primary), transparent, var(--accent-secondary));
            z-index: -1; animation: spinBg 4s linear infinite; opacity: 0.5;
        }
        .login-title {
            font-family: var(--font-code);
            font-size: clamp(0.85rem, 3vw, 1.3rem);
            color: #fff; text-align: center;
            letter-spacing: 3px; margin-bottom: 20px;
            text-shadow: 0 0 15px var(--accent-primary);
        }
        .login-field { margin-bottom: 14px; width: 100%; text-align: center; }
        .login-field .cmd-input {
            width: 82%; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px; color: var(--accent-primary);
            padding: 10px; font-size: clamp(0.75rem, 2.5vw, 1rem);
            text-align: center; font-family: var(--font-code);
            outline: none; transition: all 0.3s ease;
        }
        .login-field .cmd-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
            background: rgba(0, 255, 157, 0.05);
        }
        #login-msg {
            min-height: 20px;
            font-family: var(--font-code);
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .btn-connect {
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 12px 25px;
            font-family: var(--font-code); font-weight: bold;
            letter-spacing: 1px; cursor: pointer;
            transition: all 0.3s; margin-top: 15px;
            border-radius: 30px; text-transform: uppercase; white-space: nowrap;
        }
        .btn-connect:hover {
            background: var(--accent-primary); color: #000;
            box-shadow: 0 0 25px var(--accent-primary); scale: 1.05;
        }
        .btn-logout {
            font-size: 0.7rem; padding: 8px 15px;
            border-color: rgba(255,255,255,0.3);
            color: #fff; margin-top: 0;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.15); color: #fff; scale: 1.05; }

        .hud-overlay {
            position: fixed; top: 30px; left: 30px;
            pointer-events: none; z-index: 100;
            border-left: 3px solid var(--accent-primary);
            padding: 10px 20px;
            background: linear-gradient(90deg, rgba(0,255,157,0.1) 0%, transparent 100%);
        }
        .hud-title {
            font-family: var(--font-code); font-size: 1.2rem; letter-spacing: 2px;
        }
        .hud-title-accent  { color: var(--accent-primary); }
        .hud-status        { font-size: 0.8rem; color: var(--accent-primary); margin-top: 5px; }
        .hud-meta          { font-size: 0.7rem; font-family: var(--font-code); margin-top: 5px; }
        .hud-meta-dim      { opacity: 0.8; }
        .hud-meta-dimmer   { opacity: 0.6; }

        .hud-top-right {
            position: fixed; top: 30px; right: 30px;
            text-align: right; pointer-events: auto; z-index: 100;
            display: flex; align-items: center; gap: 15px;
        }
        .hud-avatar {
            width: 40px; height: 40px;
            border-radius: 50%; border: 1px solid var(--accent-primary);
        }

        .system-logs-container {
            position: fixed; bottom: 30px; left: 30px;
            width: 300px; z-index: 100;
            font-family: var(--font-code); font-size: 0.65rem;
        }
        .log-list {
            list-style: none; padding: 0; margin: 0;
            display: flex; flex-direction: column-reverse; gap: 6px;
        }
        .log-item {
            background: rgba(0, 255, 157, 0.05);
            border-left: 2px solid var(--accent-primary);
            padding: 5px 10px; opacity: 0;
            animation: logIn 0.3s forwards;
        }
        .log-item.alert {
            border-color: var(--accent-danger);
            background: rgba(255, 42, 42, 0.05);
            color: var(--accent-danger);
        }
        .log-item.warning {
            border-color: var(--accent-restricted);
            background: rgba(255,170,0,0.05);
            color: var(--accent-restricted);
        }
        .log-time { opacity: 0.5; margin-right: 8px; font-size: 0.55rem; }

        .neural-dashboard {
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; animation: fadeIn 2s ease-out;
        }
        .orbit {
            position: absolute; top: 50%; left: 50%;
            translate: -50% -50%;
            border-radius: 50%; pointer-events: none; z-index: 1;
        }
        .orbit-1  { width: 50vmin; height: 50vmin;  border: 1px dashed rgba(0, 255, 157, 0.15); }
        .orbit-2  { width: 75vmin; height: 75vmin;  border: 1px dashed rgba(255, 170, 0, 0.15); }
        .orbit-10 { width: 95vmin; height: 95vmin;  border: 1px dashed rgba(255, 42, 42, 0.15); }
        .orbit-label {
            position: absolute; bottom: -8px; left: 50%;
            translate: -50% 0;
            background: var(--bg-glass); padding: 0 10px;
            font-family: var(--font-code); font-size: 0.65rem;
            color: rgba(255,255,255,0.4); letter-spacing: 3px;
            white-space: nowrap; border-radius: 10px;
        }

        .synapse-lines {
            position: absolute; top: 50%; left: 50%;
            translate: -50% -50%;
            width: 100vmin; height: 100vmin; z-index: 1; pointer-events: none;
        }
        .synapse-lines line {
            stroke: rgba(0, 255, 157, 0.25); stroke-width: 1.5;
            stroke-dasharray: 6 4; animation: dataFlow 30s linear infinite reverse;
        }
        .synapse-lines line.restricted { stroke: rgba(255, 170, 0, 0.3); }
        .synapse-lines line.admin      { stroke: rgba(255, 42, 42, 0.3); }

        .node {
            position: absolute; top: 50%; left: 50%;
            border-radius: 50%;
            background: var(--bg-glass);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 157, 0.4);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: box-shadow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        background 0.4s, border-color 0.4s, opacity 0.3s, filter 0.3s;
            z-index: 10; color: #fff; padding: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .node::after {
            content: ''; position: absolute; inset: 5px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }
        .node:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 35px rgba(0, 255, 157, 0.4), inset 0 0 20px rgba(0, 255, 157, 0.2);
            z-index: 20; background: rgba(0, 255, 157, 0.15);
        }
        .node .icon {
            font-size: clamp(1.2rem, 3vmin, 1.8rem); margin-bottom: 5px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.6));
            transition: scale 0.3s;
        }
        .node:hover .icon { scale: 1.1; }
        .node .label {
            font-family: var(--font-code);
            font-size: clamp(0.55rem, 1.2vmin, 0.7rem);
            text-align: center; letter-spacing: 2px;
            opacity: 0.7; transition: opacity 0.3s;
        }
        .node:hover .label { opacity: 1; text-shadow: 0 0 10px var(--accent-primary); }

        .node-core {
            width: clamp(120px, 20vmin, 180px);
            height: clamp(120px, 20vmin, 180px);
            translate: -50% -50%;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.2), inset 0 0 30px rgba(0, 255, 157, 0.1);
            background: rgba(6, 10, 15, 0.85);
            will-change: transform, box-shadow;
        }
        .node-core::before {
            content: ''; position: absolute; inset: -15px;
            border-radius: 50%; border: 2px dashed rgba(0, 184, 255, 0.5);
            animation: spinBg 15s linear infinite; pointer-events: none;
        }
        .node-core::after {
            content: ''; position: absolute; inset: -25px;
            border-radius: 50%; border: 1px dotted rgba(0, 255, 157, 0.3);
            animation: spinBg 25s linear infinite reverse; pointer-events: none;
        }
        .node-core:hover { scale: 1.05; }
        .node-core .icon  { font-size: clamp(2rem, 5vmin, 3.5rem); }
        .node-core .label { font-weight: bold; opacity: 1; }

        .node-sub {
            width:  clamp(75px, 14vmin, 110px);
            height: clamp(75px, 14vmin, 110px);
            translate:
                calc(-50% + sin(var(--angle, 0deg)) * var(--orbit, 25vmin))
                calc(-50% - cos(var(--angle, 0deg)) * var(--orbit, 25vmin));
            animation: floatAnim 4s ease-in-out infinite;
            animation-delay: var(--float-delay, 0s);
            will-change: transform, box-shadow;
        }
        .node-sub:hover {
            scale: 1.15;
            animation-play-state: paused;
        }

        .node.status-restricted { border-color: var(--accent-restricted); }
        .node.status-restricted:hover {
            box-shadow: 0 0 35px rgba(255, 170, 0, 0.5), inset 0 0 20px rgba(255, 170, 0, 0.2);
            background: rgba(255, 170, 0, 0.15); border-color: var(--accent-restricted);
        }
        .node.status-restricted .icon {
            filter: drop-shadow(0 0 8px rgba(255, 170, 0, 0.6));
        }
        .node.status-admin { border-color: var(--accent-danger); }
        .node.status-admin:hover {
            box-shadow: 0 0 40px rgba(255, 42, 42, 0.6), inset 0 0 25px rgba(255, 42, 42, 0.3);
            background: rgba(255, 42, 42, 0.2); border-color: var(--accent-danger);
        }
        .node.status-admin .icon {
            filter: drop-shadow(0 0 10px rgba(255, 42, 42, 0.8));
        }

        .node.node-locked {
            opacity: 0.42;
            filter: saturate(0.25);
            cursor: not-allowed;
        }
        .node.node-locked:hover { scale: 1; }

        .lock-badge {
            display: none;
            position: absolute; top: 5px; right: 5px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.65);
            border-radius: 50%; width: 17px; height: 17px;
            align-items: center; justify-content: center;
            z-index: 2;
        }
        .node.node-locked .lock-badge { display: flex; }

        #node-tooltip {
            position: fixed;
            background: rgba(4, 8, 12, 0.97);
            border: 1px solid var(--accent-restricted);
            color: var(--accent-restricted);
            font-family: var(--font-code); font-size: 0.65rem;
            letter-spacing: 1px; padding: 6px 12px;
            border-radius: 4px; pointer-events: none; z-index: 1001;
            opacity: 0; translate: 0 5px;
            transition: opacity 0.15s ease, translate 0.15s ease;
            white-space: nowrap;
            box-shadow: 0 0 12px rgba(255,170,0,0.25);
        }
        #node-tooltip.visible   { opacity: 1; translate: 0 0; }
        #node-tooltip.admin-tip {
            border-color: var(--accent-danger);
            color: var(--accent-danger);
            box-shadow: 0 0 12px rgba(255,42,42,0.3);
        }

        .glitch-anim {
            animation: glitchError 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
            border-color: var(--accent-danger) !important;
            box-shadow: 0 0 15px rgba(255,42,42,0.4), inset 0 0 15px rgba(255,42,42,0.4) !important;
        }
        .term-error { color: var(--accent-danger);   text-shadow: 0 0 5px var(--accent-danger); }
        .term-info  { color: var(--accent-secondary); text-shadow: 0 0 5px var(--accent-secondary); }
        .term-dim   { color: rgba(255,255,255,0.5); }
        .blink      { animation: blinkAnim 1s infinite; }

        @keyframes glitchError {
            0%   { transform: translate(0) }
            20%  { transform: translate(-4px,  2px) }
            40%  { transform: translate(-4px, -2px) }
            60%  { transform: translate( 4px,  2px) }
            80%  { transform: translate( 4px, -2px) }
            100% { transform: translate(0) }
        }
        @keyframes blinkAnim  { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes logIn      {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes spinBg     { to { rotate: 360deg; } }
        @keyframes floatAnim  { 0%, 100% { margin-top: 0; } 50% { margin-top: -8px; } }
        @keyframes dataFlow   { to { stroke-dashoffset: 1000; } }
        @keyframes systemBoot {
            0%   { opacity: 0; transform: scale(0.8) translateY(30px); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1)   translateY(0);    filter: blur(0);   }
        }
        @keyframes fadeIn     {
            from { opacity: 0; filter: blur(10px); }
            to   { opacity: 1; filter: blur(0); }
        }

        @media (max-width: 768px) {
            .hud-overlay         { top: 12px; left: 12px; padding: 8px 14px; }
            .hud-top-right       { top: 12px; right: 12px; }
            .system-logs-container { display: none; }
            .node-sub[data-orbit="1"]  { --orbit: 23vmin; }
            .node-sub[data-orbit="2"]  { --orbit: 35vmin; }
            .node-sub[data-orbit="10"] { --orbit: 43vmin; }
            .orbit-1  { width: 46vmin; height: 46vmin; }
            .orbit-2  { width: 70vmin; height: 70vmin; }
            .orbit-10 { width: 88vmin; height: 88vmin; }
        }
        @media (max-width: 480px) {
            .node-sub  { width: clamp(58px, 11vmin, 80px); height: clamp(58px, 11vmin, 80px); }
            .node .icon  { font-size: 1.2rem; }
            .node .label { font-size: 0.5rem; }
            .hud-title   { font-size: 0.95rem; }
        }

        .node-stat {
            position: absolute; bottom: 6px; right: 8px;
            font-family: var(--font-code); font-size: 0.55rem;
            letter-spacing: 1px; opacity: 0.85;
            pointer-events: none; transition: opacity 0.3s;
        }
        .node-stat-val {
            font-size: 0.75rem; font-weight: bold;
            display: block; text-align: center;
            line-height: 1; margin-bottom: 1px;
        }
        .node:hover .node-stat { opacity: 1; }

        .node-alert {
            position: absolute; top: 4px; right: 4px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-danger);
            box-shadow: 0 0 6px var(--accent-danger);
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
            animation: pulseBadge 2s infinite;
        }
        .node-alert.visible { opacity: 1; }
        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body>

<div class="scanlines"></div>
<div class="vignette"></div>

<canvas id="neural-network" role="presentation" aria-hidden="true"></canvas>

<div id="node-tooltip" role="tooltip" aria-hidden="true"></div>

<section id="login-overlay" aria-label="Authentification système">
    <div class="login-box" id="login-box">
        <div class="login-title">&gt;_ LIAISON SYNAPTIQUE</div>
        <div class="login-field">
            <label for="login-username" class="sr-only">Empreinte corticale</label>
            <input type="text" id="login-username" class="cmd-input"
                   placeholder="[ EMPREINTE_CORTICALE ]"
                   autocomplete="off" autofocus aria-label="Identifiant agent">
        </div>
        <div class="login-field">
            <label for="login-password" class="sr-only">Souche mémorielle</label>
            <input type="password" id="login-password" class="cmd-input"
                   placeholder="[ SOUCHE_MÉMORIELLE ]" aria-label="Mot de passe">
        </div>
        <div id="login-msg" aria-live="assertive" aria-atomic="true"></div>
        <button class="btn-connect" onclick="handleLogin()" aria-label="Initier la connexion">
            INITIER L'UPLINK
        </button>
    </div>
</section>

<div class="hud-overlay auth-content" aria-label="Informations de session" role="status">
    <div class="hud-title">SAS // <span class="hud-title-accent">MAINFRAME</span></div>
    <div class="hud-status" id="conn-status">&gt; CONNEXION ÉTABLIE</div>
    <div class="hud-meta hud-meta-dim">
        AGENT: <span id="mini-username" style="color:#fff;">ANONYME</span>
    </div>
    <div class="hud-meta hud-meta-dimmer">
        ACCRÉDITATION: <span id="mini-rank">LVL-0</span>
    </div>
</div>

<div class="hud-top-right auth-content">
    <img id="sidebar-avatar" src="assets/default.jpg" alt="Avatar agent" class="hud-avatar">
    <button class="btn-connect btn-logout" onclick="logout()" aria-label="Se déconnecter">
        DÉCONNEXION ⏏
    </button>
</div>

<div class="system-logs-container auth-content" aria-label="Journaux système" role="log" aria-live="polite">
    <ul id="system-logs" class="log-list"></ul>
</div>

<div class="neural-dashboard auth-content" role="navigation" aria-label="Modules du système">

    <div class="orbit orbit-1" aria-hidden="true"></div>
    <div class="orbit orbit-2" aria-hidden="true"></div>
    <div class="orbit orbit-10" aria-hidden="true"></div>

    <svg class="synapse-lines" aria-hidden="true">
        <line x1="50%" y1="50%" x2="62.5%"  y2="28.35%"/>
        <line x1="50%" y1="50%" x2="75%"    y2="50%"   />
        <line x1="50%" y1="50%" x2="62.5%"  y2="71.65%"/>
        <line x1="50%" y1="50%" x2="37.5%"  y2="71.65%"/>
        <line x1="50%" y1="50%" x2="25%"    y2="50%"   />
        <line x1="50%" y1="50%" x2="37.5%"  y2="28.35%"/>
        <line x1="50%" y1="50%" x2="50%"    y2="12.5%"  class="restricted"/>
        <line x1="50%" y1="50%" x2="50%"    y2="87.5%"  class="restricted"/>
        <line x1="50%" y1="50%" x2="83.58%" y2="16.42%" class="admin"/>
        <line x1="50%" y1="50%" x2="16.42%" y2="16.42%" class="admin"/>
        <line x1="50%" y1="50%" x2="16.42%" y2="83.58%" class="restricted"/>
        <line x1="62.5%"  y1="28.35%" x2="50%"    y2="12.5%"  class="restricted"/>
        <line x1="37.5%"  y1="28.35%" x2="50%"    y2="12.5%"  class="restricted"/>
        <line x1="62.5%"  y1="28.35%" x2="83.58%" y2="16.42%" class="admin"/>
        <line x1="37.5%"  y1="28.35%" x2="16.42%" y2="16.42%" class="admin"/>
    </svg>

    <button class="node node-core"
            onclick="accessModule('profile.html', 1)"
            aria-label="Accéder au noyau central — Profil">
        <span class="icon" aria-hidden="true">🧠</span>
        <span class="label">NOYAU CENTRAL</span>
    </button>

    <!-- ORBIT 1 -->
    <button class="node node-sub" data-orbit="1"
            style="--angle:30deg; --orbit:25vmin; --float-delay:0.1s"
            onclick="accessModule('database.html', 1)"
            data-required-level="1"
            aria-label="Module Agents (LVL-1)">
        <span class="lock-badge" aria-hidden="true">🔒</span>
        <span class="icon" aria-hidden="true">👥</span>
        <span class="label">AGENTS</span>
        <span class="node-stat" id="stat-agents" style="color:var(--accent-secondary)">
            <span class="node-stat-val" id="stat-agents-val">—</span>OPS
        </span>
        <span class="node-alert" id="alert-agents"></span>
    </button>

    <button class="node node-sub" data-orbit="1"
            style="--angle:90deg; --orbit:25vmin; --float-delay:0.3s"

<script src="js/script.js" defer></script>

<script>
const canvas = document.getElementById('neural-network');
const ctx    = canvas.getContext('2d');
let width, height, particles = [];

const CONNECT_DIST = 180;
const CELL_SIZE    = CONNECT_DIST;
const NEURON_COLOR = '0, 255, 157';
const MOUSE_COLOR  = '0, 184, 255';
let mouse = { x: null, y: null, radius: 200 };

window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener('mouseout',  () => { mouse.x = null; mouse.y = null; });

class Neuron {
    constructor() {
        this.x      = Math.random() * width;
        this.y      = Math.random() * height;
        this.vx     = (Math.random() - 0.5) * 0.5;
        this.vy     = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2 + 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > width)  this.vx *= -1;
        if (this.y < 0 || this.y > height)  this.vy *= -1;
        if (mouse.x != null) {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const d  = Math.sqrt(dx * dx + dy * dy);
            if (d < mouse.radius && d > 0) {
                const f = (mouse.radius - d) / mouse.radius;
                this.x -= (dx / d) * f * 2;
                this.y -= (dy / d) * f * 2;
            }
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${NEURON_COLOR}, 0.8)`;
        ctx.fill();
    }
}

function buildGrid() {
    const grid = new Map();
    particles.forEach((p, i) => {
        const key = `${Math.floor(p.x / CELL_SIZE)},${Math.floor(p.y / CELL_SIZE)}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(i);
    });
    return grid;
}

function drawConnections(grid) {
    particles.forEach((p, i) => {
        const cx = Math.floor(p.x / CELL_SIZE);
        const cy = Math.floor(p.y / CELL_SIZE);
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const neighbors = grid.get(`${cx + dx},${cy + dy}`);
                if (!neighbors) continue;
                for (const j of neighbors) {
                    if (j <= i) continue;
                    const ddx  = p.x - particles[j].x;
                    const ddy  = p.y - particles[j].y;
                    const dist = Math.sqrt(ddx * ddx + ddy * ddy);
                    if (dist < CONNECT_DIST) {
                        const alpha = (1 - dist / CONNECT_DIST) * 0.4;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(${NEURON_COLOR}, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        if (mouse.x != null) {
            const dm = Math.sqrt((p.x - mouse.x) ** 2 + (p.y - mouse.y) ** 2);
            if (dm < mouse.radius) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.strokeStyle = `rgba(${MOUSE_COLOR}, ${(1 - dm / mouse.radius) * 0.6})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }
    });
}

function initNeurons() {
    particles = [];
    const count = Math.min(Math.floor((width * height) / 10000), 200);
    for (let i = 0; i < count; i++) particles.push(new Neuron());
}

function animateNeurons() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(n => { n.update(); n.draw(); });
    drawConnections(buildGrid());
    requestAnimationFrame(animateNeurons);
}

function resize() {
    width  = canvas.width  = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', () => { resize(); initNeurons(); });
resize(); initNeurons(); animateNeurons();

const tooltip = document.getElementById('node-tooltip');
document.querySelectorAll('.node[data-tooltip]').forEach(node => {
    node.addEventListener('mouseenter', () => {
        tooltip.textContent = node.dataset.tooltip;
        tooltip.setAttribute('aria-hidden', 'false');
        tooltip.classList.toggle('admin-tip', node.classList.contains('status-admin'));
        tooltip.classList.add('visible');
    });
    node.addEventListener('mousemove', e => {
        const x = Math.min(e.clientX + 18, window.innerWidth  - 250);
        const y = Math.max(e.clientY - 44, 6);
        tooltip.style.left = x + 'px';
        tooltip.style.top  = y + 'px';
    });
    node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        tooltip.setAttribute('aria-hidden', 'true');
    });
});

function updateNodeAccess() {
    const rankText  = document.getElementById('mini-rank')?.textContent ?? 'LVL-1';
    const match     = rankText.match(/(\d+)/);
    const userLevel = match ? parseInt(match[1]) : 1;
    document.querySelectorAll('.node[data-required-level]').forEach(node => {
        const required = parseInt(node.dataset.requiredLevel);
        node.classList.toggle('node-locked', userLevel < required);
    });
}

let statsInterval = null;

async function loadNodeStats() {
    const token = localStorage.getItem('sas_token');
    if (!token) return;
    const h = { 'Authorization': `Bearer ${token}` };

    function setStat(id, value, alertId = null, alertThreshold = 1) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
        if (alertId) {
            const badge = document.getElementById(alertId);
            if (badge) {
                const isAlert = typeof value === 'string' && value.includes('/')
                              ? value.startsWith('0/')
                              : parseInt(value) >= alertThreshold;
                badge.classList.toggle('visible', isAlert);
            }
        }
    }

    try {
        const res = await fetch('/api/game?entity=missions', { headers: h });
        if (res.ok) {
            const missions = await res.json();
            const active = missions.filter(m => m.status === 'ACTIVE').length;
            setStat('stat-missions-val', active, 'alert-missions', 1);
            const statEl = document.getElementById('stat-missions');
            if (statEl) statEl.style.color = active > 0 ? 'var(--accent-danger)' : 'var(--accent-primary)';
        }
    } catch(e) {}

    try {
        const res = await fetch('/api/game?entity=equipment', { headers: h });
        if (res.ok) {
            const data = await res.json();
            const inv = Array.isArray(data) ? data : (data.inventory || []);
            const available = inv.filter(i => !i.assigned_to).length;
            setStat('stat-gear-val', `${available}/${inv.length}`, 'alert-gear');
        }
    } catch(e) {}

    try {
        const res = await fetch('/api/game?entity=users', { headers: h });
        if (res.ok) {
            const agents = await res.json();
            setStat('stat-agents-val', agents.length);
        }
    } catch(e) {}

    try {
        const res = await fetch('/api/game?entity=boards', { headers: h });
        if (res.ok) {
            const boards = await res.json();
            setStat('stat-invest-val', boards.length);
        }
    } catch(e) {}

    try {
        const res = await fetch('/api/game?entity=markers');
        if (res.ok) {
            const markers = await res.json();
            setStat('stat-map-val', markers.length);
        }
    } catch(e) {}

    const session = JSON.parse(localStorage.getItem('sas_session') || '{}');
    if (parseInt(session.rank) >= 3) {
        try {
            const res = await fetch('/api/medical', { headers: h });
            if (res.ok) {
                const injuries = await res.json();
                const node = document.querySelector('.node.status-admin[data-orbit="10"][onclick*="medical"]');
                if (node) {
                    if (!node.querySelector('.node-stat')) {
                        const stat = document.createElement('span');
                        stat.className = 'node-stat';
                        stat.style.color = 'var(--accent-danger)';
                        stat.innerHTML = `<span class="node-stat-val" id="stat-med-val">${injuries.length}</span>BLS`;
                        node.appendChild(stat);
                        if (injuries.length > 0) {
                            const alert = document.createElement('span');
                            alert.className = 'node-alert visible';
                            node.appendChild(alert);
                        }
                    } else {
                        const valEl = document.getElementById('stat-med-val');
                        if(valEl) valEl.textContent = injuries.length;
                    }
                }
            }
        } catch(e) {}
    }
}

const bodyObserver = new MutationObserver(() => {
    if (document.body.classList.contains('logged-in')) {
        updateNodeAccess();
        cascadeNodes();
        loadNodeStats();
        loadActivityFeed();
        if (!statsInterval) statsInterval = setInterval(loadNodeStats, 30000);
    } else {
        if (statsInterval) { clearInterval(statsInterval); statsInterval = null; }
    }
});
bodyObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });

const rankObserver = new MutationObserver(() => {
    if (document.body.classList.contains('logged-in')) updateNodeAccess();
});
const miniRankEl = document.getElementById('mini-rank');
if (miniRankEl) rankObserver.observe(miniRankEl, { childList: true, characterData: true, subtree: true });

function cascadeNodes() {
    document.querySelectorAll('.node-sub').forEach((node, i) => {
        node.animate(
            [{ opacity: 0, scale: '0.1' }, { opacity: 1, scale: '1' }],
            { duration: 600, delay: 200 + i * 140, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)', fill: 'backwards' }
        );
    });
}

window._activityFeedUpdate = function(data) {
    const typeMap = {
        WARNING: 'alert', RANK_CHANGE: 'warning',
        MISSION_CREATED: 'info', MISSION_UPDATE: 'info',
        EQUIPMENT: 'info', INVESTIGATION: 'info', ROSTER_UPDATE: 'info'
    };
    const type = typeMap[data.action_type] || 'info';
    const logList = document.getElementById('system-logs');
    if (!logList) return;
    const li = document.createElement('li');
    li.className = `log-item ${type}`;
    li.style.opacity = '0';
    const time = new Date(data.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    li.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${data.details}</span>`;
    logList.insertBefore(li, logList.firstChild);
    requestAnimationFrame(() => requestAnimationFrame(() => { li.style.animation = 'logIn 0.3s forwards'; }));
    if (logList.children.length > 15) logList.removeChild(logList.lastChild);
};

async function loadActivityFeed() {
    const token = localStorage.getItem('sas_token');
    if (!token) return;
    try {
        const res = await fetch('/api/activity', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) return;
        const logs = await res.json();
        const logList = document.getElementById('system-logs');
        if (!logList) return;
        logList.innerHTML = '';
        const typeMap = {
            WARNING: 'alert', RANK_CHANGE: 'warning',
            MISSION_CREATED: 'info', MISSION_UPDATE: 'info',
            EQUIPMENT: 'info', INVESTIGATION: 'info', ROSTER_UPDATE: 'info'
        };
        logs.slice(0, 12).forEach(log => {
            const li = document.createElement('li');
            li.className = `log-item ${typeMap[log.action_type] || 'info'}`;
            const time = new Date(log.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${log.details}</span>`;
            logList.appendChild(li);
        });

        const session = JSON.parse(localStorage.getItem('sas_session') || '{}');
        if (typeof SAS_NOTIFY !== 'undefined') SAS_NOTIFY.init(session.username);
    } catch (e) { console.warn('Activity feed error:', e); }
}
</script>
